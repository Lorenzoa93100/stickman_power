<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Stickman Power</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;font-family:Arial,sans-serif;}
  #game-container{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #game-container canvas{display:block;touch-action:none;}
  #pad{display:none;position:fixed;inset:0;pointer-events:none;z-index:100;}
  #pad.on{display:block;}
  .stick{pointer-events:auto;position:absolute;bottom:18px;left:16px;width:150px;height:150px;}
  .skey{position:absolute;display:flex;align-items:center;justify-content:center;font-size:24px;color:rgba(255,255,255,.9);
        background:rgba(255,255,255,.13);border:2px solid rgba(255,255,255,.28);border-radius:14px;transition:background .07s,transform .07s;}
  .skey.hit{background:rgba(255,255,255,.4);transform:scale(.92);}
  #dL{left:0;top:52px;width:48px;height:50px;} #dR{left:102px;top:52px;width:48px;height:50px;}
  #dU{left:51px;top:0;width:48px;height:48px;} #dD{left:51px;bottom:0;width:48px;height:48px;}
  #btns{pointer-events:none;position:absolute;bottom:20px;right:16px;width:200px;height:200px;}
  .abtn{pointer-events:auto;position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;
        font-weight:900;font-size:12px;color:#fff;text-shadow:0 1px 2px #000;border:3px solid rgba(255,255,255,.35);
        box-shadow:0 4px 10px rgba(0,0,0,.5);transition:transform .07s,filter .07s;}
  .abtn.hit{transform:scale(.86);filter:brightness(1.4);}
  #bP{right:96px;bottom:60px;width:64px;height:64px;background:radial-gradient(circle at 35% 30%,#ff6b6b,#c0202a);}
  #bK{right:18px;bottom:18px;width:64px;height:64px;background:radial-gradient(circle at 35% 30%,#5db4ff,#1565c0);}
  #bU{right:24px;bottom:96px;width:56px;height:56px;background:radial-gradient(circle at 35% 30%,#ffd166,#e08a00);}
  #bH{right:108px;bottom:130px;width:62px;height:62px;background:radial-gradient(circle at 35% 30%,#c08bff,#6a1bd0);}
  #bB{right:130px;bottom:4px;width:54px;height:40px;border-radius:20px;background:rgba(120,120,140,.65);}
</style>
</head>
<body>
<div id="game-container"></div>
<div id="pad">
  <div class="stick">
    <div class="skey" id="dL">◀</div><div class="skey" id="dR">▶</div>
    <div class="skey" id="dU">▲</div><div class="skey" id="dD">▼</div>
  </div>
  <div id="btns">
    <div class="abtn" id="bH">HADO</div>
    <div class="abtn" id="bU">UPPER</div>
    <div class="abtn" id="bP">PUNCH</div>
    <div class="abtn" id="bK">KICK</div>
    <div class="abtn" id="bB">BLOC</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<script>
const W=960,H=540,FLOOR=H-66,GRAV=2000,JUMPV=-760;

// ── Sprite frame table (extracted from cleaned ryu.png) ──
const RYU=(()=>{const F={};const A=(n,x,y,w,h)=>F[n]={x,y,w,h};
A('idle0',3,904,60,95);A('idle1',68,904,59,95);A('idle2',133,904,58,95);A('idle3',200,904,55,95);
A('walk0',4,1015,54,98);A('walk1',66,1015,58,98);A('walk2',132,1015,54,98);
A('crouch0',1,1213,53,61);A('crouch1',68,1213,52,61);A('crouch2',142,1213,53,61);
A('jump0',40,1477,55,102);A('jump1',164,1477,61,102);A('jump2',278,1477,104,102);A('jump3',425,1477,53,102);A('jump4',520,1477,122,102);A('jump5',687,1477,71,102);
A('punch0',44,1797,64,91);A('punch1',129,1797,92,91);
A('strong0',61,1890,60,95);A('strong1',178,1890,74,95);A('strong2',269,1890,108,95);
A('cpunch0',33,2328,69,61);A('cpunch1',120,2328,95,61);
A('upper0',27,2461,60,122);A('upper1',103,2461,73,122);A('upper2',209,2461,57,122);
A('kick0',55,2861,61,94);A('kick1',157,2861,94,94);A('kick2',259,2861,120,94);A('kick3',404,2861,101,94);A('kick4',565,2861,64,94);
A('hikick0',59,3172,54,122);A('hikick1',169,3172,49,122);A('hikick2',235,3172,93,122);
A('sweep0',41,3301,97,59);A('sweep1',170,3301,146,59);
A('hadou0',6,4592,62,93);A('hadou1',103,4592,68,93);A('hadou2',202,4592,72,93);A('hadou3',295,4592,81,93);
A('fb0',3,5608,49,28);A('fb1',67,5608,55,28);A('fb2',131,5608,56,28);A('fb3',196,5608,57,28);A('fb4',261,5608,51,28);A('fb5',327,5608,54,28);
A('hurt0',4,5290,60,122);A('hurt1',69,5290,60,122);A('hurt2',132,5290,55,122);
A('ko0',27,4992,82,80);A('ko1',154,4992,102,80);A('ko2',300,4992,78,80);A('ko3',393,4992,120,80);
return F;})();

const ANIM={
  idle  :{f:['idle0','idle1','idle2','idle3'],s:150,loop:true},
  walk  :{f:['walk0','walk1','walk2','walk1'],s:110,loop:true},
  back  :{f:['walk2','walk1','walk0','walk1'],s:120,loop:true},
  jump  :{f:['jump0','jump1','jump2','jump3','jump4','jump5'],s:95,loop:false},
  crouch:{f:['crouch0','crouch1','crouch2'],s:60,loop:false},
  punch :{f:['punch0','punch1','punch0'],s:55,loop:false},
  strong:{f:['strong0','strong1','strong2','strong1'],s:60,loop:false},
  cpunch:{f:['cpunch0','cpunch1','cpunch0'],s:55,loop:false},
  upper :{f:['upper0','upper1','upper2','upper2'],s:75,loop:false},
  kick  :{f:['kick0','kick1','kick2','kick3','kick4'],s:60,loop:false},
  hikick:{f:['hikick0','hikick1','hikick2','hikick1'],s:65,loop:false},
  sweep :{f:['sweep0','sweep1','sweep0'],s:65,loop:false},
  hadou :{f:['hadou0','hadou1','hadou2','hadou3','hadou3'],s:70,loop:false},
  block :{f:['crouch0'],s:200,loop:true},
  hurt  :{f:['hurt0','hurt1','hurt2'],s:80,loop:false},
  ko    :{f:['ko0','ko1','ko2','ko3'],s:120,loop:false},
};
const ATK={
  punch :{dmg:7, hit:[1,1], reach:78, h:'high'},
  strong:{dmg:12,hit:[1,2], reach:96, h:'high'},
  cpunch:{dmg:6, hit:[1,1], reach:70, h:'low'},
  kick  :{dmg:13,hit:[1,3], reach:118,h:'high'},
  hikick:{dmg:11,hit:[1,2], reach:80, h:'high'},
  sweep :{dmg:9, hit:[1,1], reach:120,h:'low'},
  upper :{dmg:16,hit:[0,1], reach:64, h:'high'},
};

const T={left:0,right:0,up:0,down:0,block:0};
let onPunch=()=>{},onKick=()=>{},onUpper=()=>{},onHadou=()=>{};
function initTouch(){
  if(!('ontouchstart'in window)&&navigator.maxTouchPoints===0)return;
  document.getElementById('pad').classList.add('on');
  const hold=(id,k)=>{const el=document.getElementById(id);
    const set=v=>{T[k]=v;el.classList.toggle('hit',!!v);};
    el.addEventListener('touchstart',e=>{e.preventDefault();set(1);},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();set(0);},{passive:false});
    el.addEventListener('touchcancel',e=>{e.preventDefault();set(0);},{passive:false});};
  const tap=(id,fn)=>{const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();fn();el.classList.add('hit');},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();el.classList.remove('hit');},{passive:false});};
  hold('dL','left');hold('dR','right');hold('dU','up');hold('dD','down');hold('bB','block');
  tap('bP',()=>onPunch());tap('bK',()=>onKick());tap('bU',()=>onUpper());tap('bH',()=>onHadou());
}

// ════════════ PRELOAD ════════════
class Preload extends Phaser.Scene{
  constructor(){super('Preload');}
  preload(){
    const g=this.add.graphics();
    g.fillGradientStyle(0x1a0008,0x1a0008,0x05010f,0x05010f,1);g.fillRect(0,0,W,H);
    this.add.text(W/2,H/2-30,'STICKMAN POWER',{fontSize:'52px',fontFamily:'Arial Black',color:'#ff4400',stroke:'#000',strokeThickness:8}).setOrigin(.5);
    const bar=this.add.graphics();
    this.load.on('progress',v=>{bar.clear();bar.fillStyle(0x333,1).fillRoundedRect(W/2-200,H/2+40,400,16,8);bar.fillStyle(0xff5500,1).fillRoundedRect(W/2-200,H/2+40,400*v,16,8);});
    this.load.image({key:'ryu',url:'assets/ryu.png',normalMap:false});
  }
  create(){
    const tex=this.textures.get('ryu');
    Object.entries(RYU).forEach(([n,{x,y,w,h}])=>tex.add(n,0,x,y,w,h));
    this.buildBG();
    this.scene.start('Menu');
  }
  buildBG(){
    const rt=this.add.renderTexture(0,0,W,H);
    const g=this.add.graphics();
    g.fillGradientStyle(0xff9966,0xffcc88,0xffe0b0,0xffe0b0,1);g.fillRect(0,0,W,H*0.6);
    g.fillStyle(0xffee99,.85);g.fillCircle(W*0.74,H*0.2,34);
    g.fillStyle(0xffdd88,.4);g.fillCircle(W*0.74,H*0.2,52);
    [[90,300,0x6b4a2a],[260,270,0x5c3f24],[470,295,0x6b4a2a],[680,275,0x5c3f24],[860,300,0x6b4a2a]].forEach(([mx,mh,c])=>{
      g.fillStyle(c,.6);g.fillTriangle(mx-110,H*0.6,mx,mh,mx+110,H*0.6);});
    g.fillStyle(0x4a1010,1);g.fillRect(W/2-150,H*0.32,300,H*0.28);
    g.fillTriangle(W/2-176,H*0.32,W/2,H*0.13,W/2+176,H*0.32);
    g.fillTriangle(W/2-132,H*0.24,W/2,H*0.10,W/2+132,H*0.24);
    g.fillStyle(0x6a1818,1);[-100,-42,42,100].forEach(d=>g.fillRect(W/2+d-10,H*0.32,20,H*0.28));
    g.fillStyle(0x1a0000,1);g.fillRect(W/2-24,H*0.46,48,H*0.14);
    [W/2-196,W/2+196].forEach(lx=>{g.fillStyle(0xff3300,1).fillRect(lx-10,H*0.27,20,28);g.fillStyle(0xffbb33,1).fillRect(lx-8,H*0.27+2,16,24);});
    g.fillGradientStyle(0x7a4015,0x7a4015,0xc77a36,0xc77a36,1);g.fillRect(0,H*0.6,W,H*0.4);
    g.lineStyle(2,0x000000,.12);for(let x=0;x<W;x+=70)g.lineBetween(x,H*0.6,x,H);
    g.fillStyle(0xffffff,.10).fillRect(0,H*0.6,W,3);
    rt.draw(g,0,0);g.destroy();
    this.textures.addRenderTexture('bg',rt,false);
    this.textures.get('bg').add('__BASE',0,0,0,W,H);
  }
}

// ════════════ MENU ════════════
class Menu extends Phaser.Scene{
  constructor(){super('Menu');}
  create(){
    this.add.image(W/2,H/2,'bg').setDisplaySize(W,H);
    const t=this.add.text(W/2,108,'STICKMAN POWER',{fontSize:'62px',fontFamily:'Arial Black',color:'#ff4400',stroke:'#1a0000',strokeThickness:10}).setOrigin(.5);
    this.add.text(W/2,176,'ストリートファイト',{fontSize:'24px',color:'#ffdd00',stroke:'#000',strokeThickness:4}).setOrigin(.5);
    const s=2.0;
    this.add.image(W/2-190,FLOOR,'ryu','idle0').setOrigin(.5,1).setScale(s);
    this.add.image(W/2+190,FLOOR,'ryu','idle0').setOrigin(.5,1).setScale(-s,s).setTint(0xff7a55);
    const b=this.add.text(W/2,H-92,'▶  COMBAT',{fontSize:'34px',fontFamily:'Arial Black',backgroundColor:'#cc2200',color:'#fff',padding:{x:30,y:13},stroke:'#000',strokeThickness:4}).setOrigin(.5).setInteractive({useHandCursor:true});
    b.on('pointerover',()=>b.setStyle({backgroundColor:'#ff3300'}));
    b.on('pointerout',()=>b.setStyle({backgroundColor:'#cc2200'}));
    b.on('pointerdown',()=>this.scene.start('Fight'));
    this.add.text(W/2,H-40,'A/D bouger · W saut · S baisser · J coup · K pied · U uppercut · I hadouken · L garde',{fontSize:'12px',color:'#eee'}).setOrigin(.5);
    this.tweens.add({targets:t,y:'+=6',duration:1400,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    this.input.keyboard.once('keydown-ENTER',()=>this.scene.start('Fight'));
    this.input.keyboard.once('keydown-SPACE',()=>this.scene.start('Fight'));
    this.input.once('pointerdown',()=>{}); // ensure audio/input init on mobile
  }
}

// ════════════ FIGHTER ════════════
class Fighter{
  constructor(sc,x,p1){
    this.sc=sc;this.x=x;this.y=FLOOR;this.vx=0;this.vy=0;this.ground=true;
    this.face=p1?1:-1;this.p1=p1;this.hp=100;
    this.state='idle';this.fi=0;this.ft=0;this.adef=ANIM.idle;
    this.inv=0;this.stun=0;this.guard=0;this.hitDone=false;
    this.combo=0;this.comboT=0;this.scale=2.0;
    this.baseTint=p1?0xffffff:0xff7a55;
    this.sp=sc.add.image(x,FLOOR,'ryu','idle0').setOrigin(.5,1).setDepth(5);
    this.sp.setTint(this.baseTint);
  }
  set(s){if(this.state===s)return;this.state=s;this.fi=0;this.ft=0;this.hitDone=false;this.adef=ANIM[s]||ANIM.idle;}
  busy(){return['punch','strong','cpunch','kick','hikick','sweep','upper','hadou','hurt','ko'].includes(this.state);}
  attacking(){return ATK[this.state]!=null;}
  hitbox(){return{x:this.x-26,y:this.y-180,w:52,h:180};}
  atkbox(){
    const m=ATK[this.state];if(!m||this.hitDone)return null;
    if(this.fi<m.hit[0]||this.fi>m.hit[1])return null;
    const ox=this.face>0?14:-14-m.reach;
    const yy=m.h==='low'?this.y-60:this.y-150;
    return{x:this.x+ox,y:yy,w:m.reach,h:m.h==='low'?60:90};
  }
  hurt(dmg,dir,type){
    if(this.inv>0||this.state==='ko')return false;
    const blk=this.guard>0&&(type==='high'||Math.random()<.4);
    if(blk){this.sc.fx.block(this.x+this.face*22,this.y-110);this.vx=dir*2;this.inv=8;return'block';}
    this.hp=Math.max(0,this.hp-dmg);this.inv=20;this.vx=dir*5;this.combo=0;
    this.sp.setTintFill(0xffffff);this.sc.time.delayedCall(70,()=>this.sp.setTint(this.baseTint));
    if(this.hp<=0){this.set('ko');this.vy=-360;this.ground=false;}
    else{this.set('hurt');this.stun=24;}
    return true;
  }
  update(d,dt){
    if(!this.ground){this.vy+=GRAV*dt;this.y+=this.vy*dt;
      if(this.y>=FLOOR){this.y=FLOOR;this.vy=0;this.ground=true;this.sc.fx.dust(this.x,FLOOR,8);
        if(this.state==='jump')this.set('idle');}}
    this.x+=this.vx;this.vx*=0.82;this.x=Phaser.Math.Clamp(this.x,40,W-40);
    if(this.inv>0)this.inv--;if(this.stun>0)this.stun--;if(this.guard>0)this.guard--;
    if(this.comboT>0)this.comboT--;else this.combo=0;
    if(this.state==='hurt'&&this.stun<=0)this.set('idle');
    this.ft+=d;
    if(this.ft>=this.adef.s){this.ft-=this.adef.s;
      const n=this.adef.f.length;
      this.fi=this.adef.loop?(this.fi+1)%n:Math.min(this.fi+1,n-1);
      // end of any non-looping action (attacks, hadou, etc.) -> back to idle
      if(!this.adef.loop&&this.fi>=n-1&&this.busy()&&this.state!=='ko'&&this.state!=='hurt'&&this.ground)this.set('idle');
    }
    this.sp.setTexture('ryu',this.adef.f[this.fi]);
    this.sp.setScale(this.face<0?-this.scale:this.scale,this.scale);
    this.sp.setPosition(this.x,this.y);
    this.sp.setAlpha(this.inv>0&&this.state!=='ko'&&Math.floor(this.inv/3)%2?0.4:1);
  }
}

// ════════════ FX ════════════
class FX{
  constructor(sc){this.sc=sc;this.g=sc.add.graphics().setDepth(20);this.list=[];}
  hit(x,y,big){this.list.push({t:'hit',x,y,life:big?16:12,max:big?16:12,r:big?24:16});}
  block(x,y){this.list.push({t:'blk',x,y,life:12,max:12,r:26});}
  dust(x,y,n){for(let i=0;i<n;i++)this.list.push({t:'dust',x:x+(Math.random()-.5)*30,y:y-3,vx:(Math.random()-.5)*70,vy:-30-Math.random()*60,life:18,max:18,r:4+Math.random()*4});}
  ko(x,y){for(let i=0;i<20;i++){const a=Math.random()*6.28,s=80+Math.random()*200;this.list.push({t:'star',x,y:y-90,vx:Math.cos(a)*s,vy:Math.sin(a)*s-80,life:32,max:32,r:5+Math.random()*5,c:[0xffdd00,0xff6600,0xffffff][i%3]});}}
  update(dt){
    const g=this.g;g.clear();
    this.list=this.list.filter(s=>s.life>0);
    for(const s of this.list){
      const p=s.life/s.max;
      if(s.t==='hit'){
        g.fillStyle(0xffffff,p);g.fillCircle(s.x,s.y,s.r*p+3);
        g.fillStyle(0xffee44,p*.9);g.fillCircle(s.x,s.y,s.r*p);
        g.fillStyle(0xff7700,p*.7);g.fillCircle(s.x,s.y,s.r*p*.5);
        for(let i=0;i<6;i++){const a=i/6*6.28+(1-p)*1.5,dd=s.r*(1.4-p)*2;g.fillStyle(0xffee66,p);g.fillRect(s.x+Math.cos(a)*dd-2,s.y+Math.sin(a)*dd-2,4,4);}
      }else if(s.t==='blk'){
        g.lineStyle(3,0x66ccff,p*.85);g.strokeCircle(s.x,s.y,s.r*(1.2-p)+6);
        g.lineStyle(2,0xffffff,p*.6);g.strokeCircle(s.x,s.y,s.r*(1.2-p)+12);
      }else if(s.t==='dust'){
        s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=120*dt;g.fillStyle(0xd8b888,p*.6);g.fillCircle(s.x,s.y,s.r*p);
      }else if(s.t==='star'){
        s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=220*dt;g.fillStyle(s.c,p);g.fillCircle(s.x,s.y,s.r*p);
      }
      s.life--;
    }
  }
}

// ════════════ FIREBALL ════════════
class Fireball{
  constructor(sc,x,y,dir,owner){
    this.sc=sc;this.dir=dir;this.owner=owner;this.dead=false;this.t=0;
    this.glow=sc.add.graphics().setDepth(7);
    this.frame=0;this.ft=0;
    this.sp=sc.add.image(x,y,'ryu','fb0').setOrigin(.5).setDepth(8).setScale(dir<0?-2.2:2.2,2.2);
    if(!owner.p1)this.sp.setTint(0xffbb44);
  }
  update(d,dt){
    this.t+=d;this.ft+=d;this.sp.x+=this.dir*460*dt;
    if(this.ft>=70){this.ft-=70;this.frame=(this.frame+1)%6;this.sp.setTexture('ryu','fb'+this.frame);}
    this.sp.setScale((this.dir<0?-2.2:2.2),2.2);
    this.glow.clear();this.glow.fillStyle(this.owner.p1?0x66ddff:0xffaa44,.3);this.glow.fillCircle(this.sp.x,this.sp.y,36+Math.sin(this.t/40)*4);
    if(this.sp.x<-40||this.sp.x>W+40)this.kill();
  }
  box(){return{x:this.sp.x-30,y:this.sp.y-28,w:60,h:56};}
  kill(){if(this.dead)return;this.dead=true;this.sp.destroy();this.glow.destroy();}
}

// ════════════ AI ════════════
class AI{
  constructor(f,t){this.f=f;this.t=t;this.h=[];this.plan='advance';this.tk=0;this.pt=0;this.stuck=0;this.fbcd=0;}
  rec(m){this.h.push(m);if(this.h.length>14)this.h.shift();}
  cnt(m){return this.h.slice(-7).filter(x=>x===m).length;}
  decide(dist){
    if(this.cnt('kick')>=3)return'guard_punish';
    if(this.cnt('punch')>=4)return'retreat_kick';
    if(this.cnt('jump')>=3)return'antiair';
    if(dist>340)return Math.random()<.4?'fireball':'advance';
    if(dist>200)return Math.random()<.5?'advance':(Math.random()<.5?'fireball':'jumpin');
    if(dist<70)return Math.random()<.45?'retreat':(Math.random()<.5?'upper':'kick');
    const r=Math.random();
    if(r<.22)return'punch';if(r<.45)return'kick';if(r<.55)return'jumpin';
    if(r<.66)return'guard';if(r<.74)return'upper';return'advance';
  }
  update(dt,scene){
    const f=this.f,p=this.t;
    if(f.state==='ko'||f.stun>0)return;
    if(p.state==='punch'||p.state==='strong')this.rec('punch');
    if(p.state==='kick'||p.state==='hikick')this.rec('kick');
    if(!p.ground)this.rec('jump');
    f.face=f.x<p.x?1:-1;
    const dist=Math.abs(f.x-p.x);
    this.tk-=dt;this.stuck+=dt;this.fbcd-=dt;
    if(this.tk<=0||this.stuck>1.3){this.tk=0.1+Math.random()*0.18;this.stuck=0;
      const nx=this.decide(dist);
      if(nx!==this.plan){this.pt=(nx==='guard'||nx==='guard_punish')?0.35+Math.random()*0.3:0;this.plan=nx;}}
    this.pt-=dt;
    if(!f.ground){f.x+=f.face*150*dt;return;}
    if(f.busy())return;
    const mv=v=>{f.x+=v*dt;f.set(v*f.face>0?'walk':'back');};
    switch(this.plan){
      case'advance':mv(f.face*180);break;
      case'retreat':mv(-f.face*175);break;
      case'retreat_kick':if(dist<110){f.set('kick');this.plan='advance';}else mv(-f.face*175);break;
      case'punch':if(dist<200){f.set(Math.random()<.5?'strong':'punch');this.plan='advance';}else mv(f.face*180);break;
      case'kick':if(dist<255){f.set('kick');this.plan='advance';}else mv(f.face*180);break;
      case'upper':if(dist<130){f.set('upper');this.plan='advance';}else mv(f.face*185);break;
      case'jumpin':case'antiair':f.vy=JUMPV;f.ground=false;f.set('jump');this.plan='air';break;
      case'air':break;
      case'guard':case'guard_punish':
        f.guard=12;if(!f.busy())f.set('block');
        if(this.pt<=0)this.plan=(this.plan==='guard_punish')?'kick':'punch';break;
      case'fireball':
        if(this.fbcd<=0&&dist>140){f.set('hadou');this.fbcd=1.6;scene.queueFireball(f);this.plan='advance';}
        else mv(f.face*150);break;
      default:mv(f.face*180);
    }
  }
}

// ════════════ FIGHT ════════════
class Fight extends Phaser.Scene{
  constructor(){super('Fight');}
  create(){
    this.gameState='count';this.roundActive=false;this.timer=99;this.tt=0;
    this.wins={p1:0,p2:0};this.round=1;this.hitstop=0;this.fireballs=[];this.pendingFB=[];
    this.add.image(W/2,H/2,'bg').setDisplaySize(W,H).setDepth(0);
    this.add.graphics().setDepth(1).fillStyle(0x000000,.22).fillRect(0,FLOOR+1,W,8);
    this.p1=new Fighter(this,230,true);
    this.p2=new Fighter(this,W-230,false);
    this.ai=new AI(this.p2,this.p1);
    this.fx=new FX(this);
    this.buildHUD();
    this.keys=this.input.keyboard.addKeys({l:'A',r:'D',u:'W',d:'S',bl:'L',la:'LEFT',ra:'RIGHT',ua:'UP',da:'DOWN'});
    this.qp=this.qk=this.qu=this.qh=false;
    this.input.keyboard.on('keydown-J',()=>this.qp=true);
    this.input.keyboard.on('keydown-K',()=>this.qk=true);
    this.input.keyboard.on('keydown-U',()=>this.qu=true);
    this.input.keyboard.on('keydown-I',()=>this.qh=true);
    onPunch=()=>this.qp=true;onKick=()=>this.qk=true;onUpper=()=>this.qu=true;onHadou=()=>this.qh=true;
    this.countdown();
  }
  queueFireball(f){this.pendingFB.push(f);}
  buildHUD(){
    const d=20;
    this.add.graphics().setDepth(d).fillStyle(0x000000,.55).fillRoundedRect(16,12,330,30,6).lineStyle(2,0xffffff,.3).strokeRoundedRect(16,12,330,30,6);
    this.add.graphics().setDepth(d).fillStyle(0x000000,.55).fillRoundedRect(W-346,12,330,30,6).lineStyle(2,0xffffff,.3).strokeRoundedRect(W-346,12,330,30,6);
    this.hb1=this.add.graphics().setDepth(d+1);this.hb2=this.add.graphics().setDepth(d+1);
    this.add.text(20,46,'RYU',{fontSize:'13px',fontFamily:'Arial Black',color:'#ffcc66',stroke:'#000',strokeThickness:3}).setDepth(d+2);
    this.add.text(W-20,46,'KEN (CPU)',{fontSize:'13px',fontFamily:'Arial Black',color:'#ff8866',stroke:'#000',strokeThickness:3}).setOrigin(1,0).setDepth(d+2);
    this.timerTxt=this.add.text(W/2,8,'99',{fontSize:'42px',fontFamily:'Arial Black',color:'#ffdd00',stroke:'#000',strokeThickness:6}).setOrigin(.5,0).setDepth(d+2);
    this.dots1=[this.add.graphics().setDepth(d+2),this.add.graphics().setDepth(d+2)];
    this.dots2=[this.add.graphics().setDepth(d+2),this.add.graphics().setDepth(d+2)];
    this.comboTxt=this.add.text(0,0,'',{fontSize:'34px',fontFamily:'Arial Black',color:'#ff9900',stroke:'#000',strokeThickness:6}).setOrigin(.5).setDepth(30).setAlpha(0);
    this.center=this.add.text(W/2,H/2-20,'',{fontSize:'68px',fontFamily:'Arial Black',color:'#ffdd00',stroke:'#1a0000',strokeThickness:10}).setOrigin(.5).setDepth(30).setAlpha(0);
    this.updHUD();
  }
  updHUD(){
    const bw=322,bh=24,col=p=>p>.5?0x33cc44:p>.25?0xffbb00:0xff2200;
    const bar=(g,hp,left)=>{const p=hp/100;g.clear();if(p<=0)return;
      const x=left?20:W-20-bw*p;
      g.fillStyle(col(p),1).fillRoundedRect(x,16,bw*p,bh,4);g.fillStyle(0xffffff,.2).fillRoundedRect(x,16,bw*p,bh*.4,4);};
    bar(this.hb1,this.p1.hp,true);bar(this.hb2,this.p2.hp,false);
    [this.dots1,this.dots2].forEach((dd,pi)=>{const w=pi?this.wins.p2:this.wins.p1;
      dd.forEach((dot,i)=>{dot.clear();const dx=pi?W-22-i*20:22+i*20;dot.fillStyle(i<w?0xffdd00:0x444444,1).fillCircle(dx,68,7).lineStyle(2,0x000000,.5).strokeCircle(dx,68,7);});});
    this.timerTxt.setText(Math.ceil(this.timer));
  }
  countdown(){
    const m=['3','2','1','FIGHT!'];let i=0;
    const go=()=>{this.center.setText(m[i]).setAlpha(1).setScale(1.7);
      this.tweens.add({targets:this.center,alpha:0,scaleX:.8,scaleY:.8,duration:720,ease:'Power2'});i++;
      if(i<m.length)this.time.delayedCall(820,go);
      else this.time.delayedCall(240,()=>{this.roundActive=true;this.gameState='fight';});};
    go();
  }
  roundResult(w){
    if(this.gameState==='over')return;
    this.roundActive=false;this.gameState='over';let msg;
    if(w==='draw')msg='EGALITE';else if(w==='p1'){msg='VOUS GAGNEZ';this.wins.p1++;}else{msg='K.O.';this.wins.p2++;}
    const loser=w==='p1'?this.p2:w==='p2'?this.p1:null;
    if(loser)this.fx.ko(loser.x,FLOOR);
    this.cameras.main.shake(200,.012);
    this.center.setText(msg).setAlpha(0).setScale(2);
    this.tweens.add({targets:this.center,alpha:1,scaleX:1,scaleY:1,duration:450,ease:'Back.easeOut'});
    this.updHUD();
    this.time.delayedCall(2600,()=>{
      if(this.wins.p1>=2||this.wins.p2>=2)this.gameOver();
      else{this.round++;this.reset();}});
  }
  reset(){
    this.fireballs.forEach(f=>f.kill());this.fireballs=[];
    [[this.p1,230,1],[this.p2,W-230,-1]].forEach(([f,x,fc])=>{f.hp=100;f.x=x;f.y=FLOOR;f.vx=0;f.vy=0;f.ground=true;f.face=fc;f.inv=0;f.stun=0;f.set('idle');});
    this.timer=99;this.tt=0;this.gameState='count';this.countdown();
  }
  gameOver(){
    this.gameState='gameover';const win=this.wins.p1>this.wins.p2;
    this.add.graphics().setDepth(28).fillStyle(0x000000,.72).fillRect(0,0,W,H);
    this.add.text(W/2,H/2-60,win?'VICTOIRE':'DEFAITE',{fontSize:'82px',fontFamily:'Arial Black',color:win?'#ffdd00':'#ff4444',stroke:'#000',strokeThickness:12}).setOrigin(.5).setDepth(30);
    const b=this.add.text(W/2,H/2+60,'REJOUER',{fontSize:'30px',fontFamily:'Arial Black',backgroundColor:'#cc2200',color:'#fff',padding:{x:24,y:12},stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(30).setInteractive({useHandCursor:true});
    b.on('pointerdown',()=>this.scene.restart());
    this.input.keyboard.once('keydown-ENTER',()=>this.scene.restart());
  }
  checkHits(){
    [[this.p1,this.p2],[this.p2,this.p1]].forEach(([a,d])=>{
      const ab=a.atkbox();if(!ab)return;const hb=d.hitbox();
      if(ab.x<hb.x+hb.w&&ab.x+ab.w>hb.x&&ab.y<hb.y+hb.h&&ab.y+ab.h>hb.y){
        const m=ATK[a.state];const res=d.hurt(m.dmg,a.face,m.h);
        if(res){a.hitDone=true;
          const hx=d.x+d.face*20,hy=res==='block'?d.y-110:d.y-130;
          if(res!=='block'){this.fx.hit(hx,hy,m.dmg>=12);this.cameras.main.shake(m.dmg>=12?130:90,m.dmg>=12?.011:.007);this.hitstop=m.dmg>=12?90:60;
            if(a.p1){a.combo++;a.comboT=70;if(a.combo>=2)this.showCombo(a.combo,hx);}}
          else this.cameras.main.shake(50,.004);
        }}});
    this.fireballs.forEach(fb=>{
      if(fb.dead)return;const tgt=fb.owner===this.p1?this.p2:this.p1;const hb=tgt.hitbox();const fx=fb.box();
      if(fx.x<hb.x+hb.w&&fx.x+fx.w>hb.x&&fx.y<hb.y+hb.h&&fx.y+fx.h>hb.y){
        const res=tgt.hurt(11,fb.dir,'high');if(res){if(res!=='block'){this.fx.hit(tgt.x,tgt.y-120,true);this.cameras.main.shake(110,.009);this.hitstop=70;
          if(fb.owner.p1){fb.owner.combo++;fb.owner.comboT=70;}}}
        fb.kill();}});
  }
  showCombo(n,x){
    this.comboTxt.setText(n+' HITS').setPosition(Phaser.Math.Clamp(x,80,W-80),H/2-60).setAlpha(1).setScale(1.3);
    this.tweens.killTweensOf(this.comboTxt);
    this.tweens.add({targets:this.comboTxt,alpha:0,y:'-=35',duration:1300,ease:'Power2'});
  }
  handleInput(dt){
    const p=this.p1;if(p.state==='ko'||p.stun>0){this.qp=this.qk=this.qu=this.qh=false;return;}
    const k=this.keys;
    if(!p.busy())p.face=p.x<this.p2.x?1:-1;
    const down=k.d.isDown||k.da.isDown||T.down;
    const blk=k.bl.isDown||T.block;
    if(blk&&p.ground&&!p.busy()){p.guard=10;p.set('block');}
    else if(p.state==='block'&&!blk)p.set('idle');
    const canAct=p.ground&&!p.busy()&&p.state!=='block';
    if(this.qh&&canAct){p.set('hadou');this.queueFireball(p);}
    else if(this.qu&&canAct){p.set('upper');}
    else if(this.qp&&canAct){p.set(down?'cpunch':'strong');}
    else if(this.qk&&canAct){p.set(down?'sweep':'kick');}
    this.qp=this.qk=this.qu=this.qh=false;
    if(!p.busy()&&p.state!=='block'){
      const L=k.l.isDown||k.la.isDown||T.left,R=k.r.isDown||k.ra.isDown||T.right;
      if(L){p.x-=200*dt;if(p.ground)p.set(p.face>0?'back':'walk');}
      else if(R){p.x+=200*dt;if(p.ground)p.set(p.face>0?'walk':'back');}
      else if((p.state==='walk'||p.state==='back')&&p.ground)p.set('idle');
      if((k.u.isDown||k.ua.isDown||T.up)&&p.ground){p.vy=JUMPV;p.ground=false;p.set('jump');this.fx.dust(p.x,FLOOR,6);}
      else if(down&&p.ground&&p.state!=='crouch'&&!L&&!R)p.set('crouch');
    }
  }
  spawnFireballs(){
    this.pendingFB.forEach(f=>this.fireballs.push(new Fireball(this,f.x+f.face*60,f.y-118,f.face,f)));
    this.pendingFB=[];
  }
  update(time,delta){
    let d=delta;
    if(this.hitstop>0){this.hitstop-=delta;d=0;}
    const dt=d/1000;
    this.fx.update(dt);
    if(this.gameState!=='fight'){this.p1.update(d,dt);this.p2.update(d,dt);this.fireballs.forEach(f=>f.update(d,dt));return;}
    this.tt+=delta;if(this.tt>=1000){this.tt-=1000;this.timer=Math.max(0,this.timer-1);}
    this.handleInput(dt);
    this.ai.update(dt,this);
    this.spawnFireballs();
    this.p1.update(d,dt);this.p2.update(d,dt);
    this.fireballs=this.fireballs.filter(f=>!f.dead);
    this.fireballs.forEach(f=>f.update(d,dt));
    this.checkHits();this.updHUD();
    if(this.p1.hp<=0&&this.p2.hp<=0)this.roundResult('draw');
    else if(this.p1.hp<=0)this.roundResult('p2');
    else if(this.p2.hp<=0)this.roundResult('p1');
    else if(this.timer<=0)this.roundResult(this.p1.hp>this.p2.hp?'p1':this.p2.hp>this.p1.hp?'p2':'draw');
  }
}

new Phaser.Game({
  type:Phaser.AUTO,width:W,height:H,parent:'game-container',backgroundColor:'#000',
  scene:[Preload,Menu,Fight],
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  render:{antialias:true,premultipliedAlpha:false},
  audio:{noAudio:true},
});
initTouch();
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kung Fu Arena</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0600;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  font-family:'Georgia',serif;
  color:#fff; overflow:hidden;
}
h1 { font-size:1.5rem; color:#c8860a; text-shadow:0 0 18px #c8860a99; margin-bottom:4px; letter-spacing:6px; }
#game-wrapper { position:relative; border:3px solid #8b4a00; box-shadow:0 0 50px #8b4a0066; }
canvas { display:block; }
#hud { display:flex; justify-content:space-between; align-items:center; width:820px; padding:5px 0; gap:8px; }
.hw { flex:1; background:#0a0400; height:22px; border:1px solid #6b3000; position:relative; overflow:hidden; }
.hb { height:100%; transition:width .08s; }
#p1b { background:linear-gradient(90deg,#008844,#44ff88); }
#p2b { background:linear-gradient(90deg,#cc3300,#ff8800); float:right; }
.nt { font-size:.72rem; font-weight:bold; letter-spacing:2px; padding:0 6px; white-space:nowrap; }
#timer { font-size:1.4rem; font-weight:bold; color:#ffd700; min-width:40px; text-align:center; text-shadow:0 0 10px #ffd700; }
#rmsg {
  position:absolute; top:40%; left:50%; transform:translate(-50%,-50%);
  font-size:3rem; font-weight:bold; color:#ffd700;
  text-shadow:0 0 25px #ffd700, 0 2px 0 #6b3000;
  pointer-events:none; letter-spacing:7px; z-index:10;
  opacity:0; transition:opacity .25s;
}
#ctrl { margin-top:6px; display:flex; gap:18px; font-size:.62rem; color:#887766; max-width:820px; }
.k { background:#1a0800; border:1px solid #6b3000; padding:1px 5px; border-radius:3px; color:#ffcc66; display:inline-block; }
#cdisplay { position:absolute; bottom:8px; left:10px; font-size:.9rem; color:#ffd700; pointer-events:none; font-weight:bold; text-shadow:0 0 10px #ffd700; }
#aiinfo { position:absolute; top:5px; right:8px; font-size:.55rem; color:rgba(255,160,60,.7); pointer-events:none; text-align:right; line-height:1.5; }
</style>
</head>
<body>
<h1>☯ KUNG FU ARENA ☯</h1>
<div id="hud">
  <span class="nt" style="color:#44ff88">🐉 CHEN</span>
  <div class="hw"><div class="hb" id="p1b" style="width:100%"></div></div>
  <div id="timer">60</div>
  <div class="hw"><div class="hb" id="p2b" style="width:100%;float:right"></div></div>
  <span class="nt" style="color:#ff8800">HONG 🔥</span>
</div>
<div id="game-wrapper">
  <canvas id="c" width="820" height="430"></canvas>
  <div id="rmsg">FIGHT!</div>
  <div id="cdisplay"></div>
  <div id="aiinfo"></div>
</div>
<div id="ctrl">
  <span><span class="k">A</span><span class="k">D</span> bouger &nbsp;<span class="k">W</span> sauter &nbsp;<span class="k">S</span> garde</span>
  <span><span class="k">U</span> poing &nbsp;<span class="k">I</span> pied &nbsp;<span class="k">O</span> uppercut &nbsp;<span class="k">J</span> ki blast</span>
</div>
<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
const W = C.width, H = C.height;
const GY = H - 68; // ground y

// ── constants
const G = 0.60, JV = -15.5, SPD = 3.8, MHP = 100, RT = 60;

// ── clouds
const clouds = Array.from({length:8}, () => ({
  x: Math.random()*W, y: 25+Math.random()*80,
  w: 55+Math.random()*90, s: .1+Math.random()*.2
}));

// ── color utils
function shade(hex, n) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const f = v => Math.max(0,Math.min(255,v+n)).toString(16).padStart(2,'0');
  return '#'+f(r)+f(g)+f(b);
}

// ── background
function drawBG() {
  // sky
  const sk = X.createLinearGradient(0,0,0,GY);
  sk.addColorStop(0,'#4aa8e8'); sk.addColorStop(.55,'#87ceeb'); sk.addColorStop(1,'#c8e8f5');
  X.fillStyle=sk; X.fillRect(0,0,W,GY);

  // far hills
  X.fillStyle='#6fa86a';
  X.beginPath(); X.moveTo(0,GY);
  for(let x=0;x<=W;x+=4){
    const y = GY-85 - Math.sin(x*.011)*48 - Math.sin(x*.023+1)*26 - Math.sin(x*.007+2)*20;
    x===0 ? X.moveTo(x,y) : X.lineTo(x,y);
  }
  X.lineTo(W,GY); X.closePath(); X.fill();

  // near hills
  X.fillStyle='#90c478';
  X.beginPath(); X.moveTo(0,GY);
  for(let x=0;x<=W;x+=4){
    const y = GY-44 - Math.sin(x*.019+.4)*30 - Math.sin(x*.033+2)*14;
    x===0 ? X.moveTo(x,y) : X.lineTo(x,y);
  }
  X.lineTo(W,GY); X.closePath(); X.fill();

  // clouds
  for(const c of clouds) {
    c.x += c.s; if(c.x > W+120) c.x = -120;
    X.save(); X.globalAlpha=.88; X.fillStyle='#fff';
    X.beginPath(); X.ellipse(c.x,c.y,c.w*.5,17,0,0,Math.PI*2); X.fill();
    X.beginPath(); X.ellipse(c.x-c.w*.22,c.y+5,c.w*.3,13,0,0,Math.PI*2); X.fill();
    X.beginPath(); X.ellipse(c.x+c.w*.22,c.y+3,c.w*.33,15,0,0,Math.PI*2); X.fill();
    X.restore();
  }

  // pagoda silhouettes
  pagoda(78, GY-28, .62); pagoda(692, GY-28, .50);
  // cherry trees
  cherry(158, GY, .80); cherry(632, GY, .76);

  // arena floor
  const fl = X.createLinearGradient(0,GY,0,H);
  fl.addColorStop(0,'#c49870'); fl.addColorStop(.5,'#a07848'); fl.addColorStop(1,'#6b4828');
  X.fillStyle=fl; X.fillRect(0,GY,W,H-GY);

  // tile perspective
  X.save();
  for(let c=-7;c<=7;c++){
    X.strokeStyle='rgba(70,35,8,.28)'; X.lineWidth=1.2;
    X.beginPath(); X.moveTo(W/2+c*52,GY); X.lineTo(W/2+c*580,H+200); X.stroke();
  }
  for(let row=0;row<6;row++){
    X.strokeStyle='rgba(70,35,8,.20)'; X.lineWidth=1;
    const y=GY+12+row*26;
    X.beginPath(); X.moveTo(0,y); X.lineTo(W,y); X.stroke();
  }
  X.restore();

  X.fillStyle='rgba(255,210,130,.14)'; X.fillRect(0,GY,W,7);
  X.save(); X.strokeStyle='#c03000'; X.lineWidth=3;
  X.shadowColor='#c03000'; X.shadowBlur=14;
  X.beginPath(); X.moveTo(0,GY); X.lineTo(W,GY); X.stroke(); X.restore();

  pillar(22,GY-85); pillar(W-22,GY-85);
  banner();
}

function pagoda(x,y,s){
  X.save(); X.translate(x,y); X.scale(s,s); X.fillStyle='rgba(55,22,6,.56)';
  for(let i=0;i<4;i++){
    const lw=52-i*9, ly=-i*34;
    X.fillRect(-lw/2,ly-30,lw,30);
    X.beginPath(); X.moveTo(-lw/2-12,ly); X.lineTo(0,ly-12); X.lineTo(lw/2+12,ly); X.closePath(); X.fill();
  }
  X.restore();
}
function cherry(x,y,s){
  X.save(); X.translate(x,y); X.scale(s,s);
  X.fillStyle='#5a3010'; X.fillRect(-5,-65,10,65); X.fillRect(-3,-105,7,44);
  for(let i=0;i<22;i++){
    const a=(i/22)*Math.PI*2, r=30+Math.sin(i*2.1)*9;
    X.fillStyle=['rgba(255,180,190,.82)','rgba(255,155,175,.72)','rgba(255,205,215,.76)'][i%3];
    X.beginPath(); X.arc(Math.cos(a)*r,-105+Math.sin(a)*r*.65, 11+Math.sin(i)*3, 0, Math.PI*2); X.fill();
  }
  X.fillStyle='rgba(255,145,165,.55)'; X.beginPath(); X.arc(0,-105,24,0,Math.PI*2); X.fill();
  X.restore();
}
function pillar(x,y){
  X.save(); X.translate(x,y);
  const g=X.createLinearGradient(-9,0,9,0);
  g.addColorStop(0,'#7a3a00'); g.addColorStop(.4,'#d4822a'); g.addColorStop(1,'#7a3a00');
  X.fillStyle=g; X.fillRect(-7,0,14,85);
  X.fillStyle='#c0600a'; X.fillRect(-13,-9,26,11); X.fillRect(-10,0,20,7);
  X.restore();
}
function banner(){
  X.save(); X.translate(W/2,8);
  X.strokeStyle='#7a3a00'; X.lineWidth=2;
  X.beginPath(); X.moveTo(-130,0); X.lineTo(130,0); X.stroke();
  for(const [lx,lc] of [[-90,'#cc2200'],[-35,'#ffaa00'],[35,'#cc2200'],[90,'#ffaa00']]){
    X.fillStyle=lc; X.shadowColor=lc; X.shadowBlur=12;
    X.beginPath(); X.ellipse(lx,18,7,11,0,0,Math.PI*2); X.fill();
    X.strokeStyle='rgba(0,0,0,.25)'; X.lineWidth=1; X.stroke();
    X.fillStyle='rgba(255,255,200,.55)'; X.beginPath(); X.ellipse(lx-2,15,2.5,3.5,0,0,Math.PI*2); X.fill();
  }
  X.shadowBlur=0; X.restore();
}

// ── projectile
class Proj {
  constructor(x,y,dir,own){ this.x=x;this.y=y;this.vx=dir*7.8;this.own=own;this.alive=true;this.t=0; }
  update(){ this.x+=this.vx; this.t+=.22; if(this.x<-30||this.x>W+30) this.alive=false; }
  draw(){
    X.save(); X.translate(this.x,this.y);
    const c=this.own===0?'#44ffaa':'#ff8822';
    X.shadowColor=c; X.shadowBlur=22;
    X.strokeStyle=c; X.lineWidth=2.5;
    X.beginPath(); X.arc(0,0,14,0,Math.PI*2); X.stroke();
    const gr=X.createRadialGradient(0,0,0,0,0,11);
    gr.addColorStop(0,'rgba(255,255,255,.9)'); gr.addColorStop(.4,c); gr.addColorStop(1,'transparent');
    X.fillStyle=gr; X.beginPath(); X.arc(0,0,11,0,Math.PI*2); X.fill();
    X.rotate(this.t*2.2); X.strokeStyle='rgba(255,255,255,.55)'; X.lineWidth=1.5;
    for(let i=0;i<4;i++){X.save();X.rotate(i*Math.PI/2);X.beginPath();X.moveTo(0,-6);X.lineTo(0,-13);X.stroke();X.restore();}
    X.restore();
  }
}

// ── Fighter
class Fighter {
  constructor(x,skin,gi,belt,hairCol,facing,isAI){
    this.x=x; this.y=GY; this.vx=0; this.vy=0;
    this.sk=skin; this.gi=gi; this.be=belt; this.ha=hairCol;
    this.f=facing; this.ai=isAI; this.hp=MHP;
    this.state='idle'; this.stTimer=0;
    this.aBox=null; this.aDmg=0; this.aType='punch';
    this.onG=true;
    this.combo=0; this.comboT=0;
    this.hdCD=0; this.flash=0; this.shk=0;
    this.wT=0; this.brT=Math.random()*6; // breath timer
    this.squash=1;
    // AI
    this.aiT=0;
    this.blk=false; this.cr=false;
    this.mode='neutral';
    this.hist=[]; // player move history tracked by AI
    this.blkCD=0; this.punishT=0;
  }

  attack(type){
    if(['attack','hurt','dead'].includes(this.state)) return false;
    this.state='attack'; this.aType=type;
    this.stTimer = type==='uppercut'?32 : type==='kick'?30 : 22;
    this.aDmg   = type==='uppercut'?14 : type==='kick'?12 : 9;
    const ox = type==='kick'?60 : 50;
    this.aBox={x:this.x+this.f*36, y:this.y-(type==='kick'?26:type==='uppercut'?80:58), w:ox, h:38};
    return true;
  }
  kiBlast(){
    if(this.hdCD>0||['hurt','dead'].includes(this.state)) return null;
    this.hdCD=100; this.state='attack'; this.stTimer=24;
    this.aType='ki'; this.aBox=null; this.aDmg=0;
    return new Proj(this.x+this.f*28, this.y-66, this.f, this.ai?1:0);
  }
  jump(){ if(!this.onG)return; this.vy=JV; this.onG=false; this.state='jump'; }
  hit(dmg,kb=0){
    if(this.state==='dead') return;
    if(this.blk) dmg=Math.max(1,Math.floor(dmg*.1));
    this.hp=Math.max(0,this.hp-dmg); this.flash=10; this.shk=8;
    if(this.hp<=0){this.state='dead';this.stTimer=9999;return;}
    this.vx+=kb; this.state='hurt'; this.stTimer=22; this.aBox=null;
  }

  update(keys,opp,projs){
    if(this.stTimer>0) this.stTimer--;
    if(this.hdCD>0) this.hdCD--;
    if(this.comboT>0) this.comboT--; else this.combo=0;
    if(this.flash>0) this.flash--;
    if(this.shk>0) this.shk-=1.8;
    if(this.blkCD>0) this.blkCD--;
    if(this.punishT>0) this.punishT--;
    if(this.state==='dead'){this._phys();return;}
    if(this.state==='hurt'&&this.stTimer<=0) this.state='idle';
    if(this.state==='attack'&&this.stTimer<=0){this.state='idle';this.aBox=null;}
    if(this.ai) this._aiUpdate(opp,projs);
    else this._playerUpdate(keys,opp,projs);
    this._phys();
    this.x=Math.max(45,Math.min(W-45,this.x));
    if(Math.abs(this.vx)>0.1) this.wT+=0.19;
    this.brT+=0.03;
    if(this.state!=='attack') this.f=opp.x>this.x?1:-1;
    if(this.squash>1) this.squash=this.squash*.78+1*.22;
  }

  _playerUpdate(keys,opp,projs){
    this.blk=false; this.cr=false;
    if(keys['s']||keys['ArrowDown']){
      this.cr=true; this.blk=true; this.state='crouch'; this.vx*=.72; return;
    }
    const ok=!['attack','hurt'].includes(this.state);
    if(ok){
      this.vx=0;
      if(keys['a']||keys['ArrowLeft']){this.vx=-SPD;if(this.state!=='jump')this.state='walk';}
      if(keys['d']||keys['ArrowRight']){this.vx=SPD;if(this.state!=='jump')this.state='walk';}
      if((keys['w']||keys['ArrowUp'])&&this.onG) this.jump();
      if(this.vx===0&&this.state==='walk') this.state='idle';
      if(keys['u']&&!keys['_u']){if(this.attack('punch')){this.combo++;this.comboT=68;}keys['_u']=true;}
      if(!keys['u'])keys['_u']=false;
      if(keys['i']&&!keys['_i']){if(this.attack('kick')){this.combo++;this.comboT=68;}keys['_i']=true;}
      if(!keys['i'])keys['_i']=false;
      if(keys['o']&&!keys['_o']){if(this.attack('uppercut')){this.combo++;this.comboT=68;}keys['_o']=true;}
      if(!keys['o'])keys['_o']=false;
      if(keys['j']&&!keys['_j']){const p=this.kiBlast();if(p)projs.push(p);keys['_j']=true;}
      if(!keys['j'])keys['_j']=false;
    }
  }

  // ── AI: reads player move history, counters patterns
  _aiUpdate(opp,projs){
    this.blk=false; this.cr=false;
    const ok=!['attack','hurt'].includes(this.state);

    // punish window: after successful block, punish with uppercut
    if(this.punishT>0&&this.blkCD<=0&&ok&&Math.abs(opp.x-this.x)<110){
      this.attack('uppercut'); this.punishT=0; this.aiT=28; return;
    }

    if(this.aiT>0){this.aiT--;return;}
    if(!ok){this.aiT=4;return;}

    const dist=Math.abs(opp.x-this.x);
    const h=this.hist, hl=Math.max(1,h.length);
    const kickR   = h.filter(m=>m==='kick').length/hl;
    const punchR  = h.filter(m=>m==='punch').length/hl;
    const jumpR   = h.filter(m=>m==='jump').length/hl;
    const kiR     = h.filter(m=>m==='ki').length/hl;

    // mode
    const myHP=this.hp/MHP, oppHP=opp.hp/MHP;
    if(myHP<.30||myHP<oppHP-.25) this.mode='defensive';
    else if(oppHP<.35) this.mode='aggressive';
    else this.mode='neutral';

    // projectile dodge
    const thr=projs.find(p=>p.own===0&&((p.vx>0&&p.x<this.x&&this.x-p.x<220)||(p.vx<0&&p.x>this.x&&p.x-this.x<220)));
    if(thr&&this.onG){this.jump();this.aiT=18;return;}

    // ── COUNTER: kick spammer (>40% kicks in history)
    if(kickR>0.40&&dist<105&&this.blkCD<=0){
      this.blk=true; this.state='block';
      this.blkCD=45; this.punishT=22; // will uppercut in 22 frames
      this.aiT=22; return;
    }

    // ── COUNTER: punch spammer → back off + ki blast
    if(punchR>0.50&&dist<95){
      this.vx=this.f*-SPD*1.6; this.aiT=14;
      if(this.hdCD===0){const p=this.kiBlast();if(p)projs.push(p);this.aiT=55;}
      return;
    }

    // ── COUNTER: jump spammer → uppercut timing
    if(jumpR>0.45&&dist<110){
      if(!opp.onG&&opp.vy>0&&dist<95){this.attack('uppercut');this.aiT=28;return;}
      this.aiT=6; return; // wait for landing
    }

    // ── COUNTER: ki spammer → rush in
    if(kiR>0.45&&dist>90){
      this.vx=(opp.x>this.x?1:-1)*SPD*1.3; this.state='walk'; this.aiT=8; return;
    }

    // ── Normal tree by mode
    const r=Math.random();
    if(this.mode==='defensive'){
      if(dist<95){
        if(r<.28){this.blk=true;this.state='block';this.blkCD=30;this.aiT=20;}
        else if(r<.50){this.attack('punch');this.aiT=24;}
        else if(r<.66){this.attack('kick');this.aiT=28;}
        else if(r<.78){this.jump();this.aiT=18;}
        else{this.vx=this.f*-SPD;this.aiT=16;}
      } else if(dist<240){
        if(r<.32&&this.hdCD===0){const p=this.kiBlast();if(p)projs.push(p);this.aiT=68;}
        else{this.vx=(opp.x>this.x?1:-1)*SPD*.85;this.aiT=12;}
      } else{this.vx=(opp.x>this.x?1:-1)*SPD;this.aiT=10;}

    } else if(this.mode==='aggressive'){
      if(dist<95){
        if(r<.06){this.blk=true;this.state='block';this.blkCD=20;this.aiT=14;}
        else if(r<.32){this.attack('punch');this.aiT=20;}
        else if(r<.55){this.attack('kick');this.aiT=24;}
        else if(r<.72){this.attack('uppercut');this.aiT=28;}
        else if(r<.84){this.jump();this.aiT=14;}
        else{this.vx=this.f*-SPD;this.aiT=10;}
      } else{this.vx=(opp.x>this.x?1:-1)*SPD*1.2;this.aiT=8;}

    } else { // neutral
      if(dist<95){
        if(r<.12){this.blk=true;this.state='block';this.blkCD=28;this.aiT=18;}
        else if(r<.36){this.attack('punch');this.aiT=22;}
        else if(r<.56){this.attack('kick');this.aiT=26;}
        else if(r<.70){this.attack('uppercut');this.aiT=30;}
        else if(r<.82){this.jump();this.aiT=16;}
        else{this.vx=this.f*-SPD*1.1;this.aiT=14;}
      } else if(dist<220){
        if(r<.22&&this.hdCD===0){const p=this.kiBlast();if(p)projs.push(p);this.aiT=60;}
        else if(r<.66){this.vx=(opp.x>this.x?1:-1)*SPD;this.aiT=10;}
        else{this.jump();this.aiT=18;}
      } else{this.vx=(opp.x>this.x?1:-1)*SPD;this.aiT=8;}
    }
  }

  trackMove(type){ // called when player lands a hit
    this.hist.push(type);
    if(this.hist.length>12) this.hist.shift();
  }

  _phys(){
    if(!this.onG) this.vy+=G;
    this.x+=this.vx; this.y+=this.vy;
    if(this.y>=GY){
      if(!this.onG) this.squash=1.4;
      this.y=GY; this.vy=0; this.onG=true;
      if(this.state==='jump') this.state='idle';
    }
    this.vx*=.80;
  }

  // ── DRAW ─────────────────────────────────────────────────────────────────────
  draw(zs=1,zo=0){
    const bx = this.x + (this.shk>0?(Math.random()-.5)*this.shk*2:0);
    const by = this.y+zo;
    const fl = this.flash>0&&this.flash%2===0;
    const sk=this.sk, gi=this.gi, be=this.be, ha=this.ha;
    const dead=this.state==='dead';
    const atk=this.state==='attack';
    const at=this.aType;
    const cr=this.cr;
    const blk=this.blk||this.state==='block';
    const hurt=this.state==='hurt';
    const wlk=this.state==='walk';
    const sw=Math.sin(this.wT);
    const br=Math.sin(this.brT)*1.8; // breath

    X.save();
    X.translate(bx,by);
    // squash/stretch on landing
    X.scale(this.f*zs*(1/this.squash), zs*this.squash);

    // Ground shadow
    X.fillStyle='rgba(0,0,0,.25)';
    X.beginPath(); X.ellipse(0,0,28*this.squash,6/this.squash,0,0,Math.PI*2); X.fill();

    // helper: draw a rounded limb (capsule)
    const limb=(x1,y1,x2,y2,r,col)=>{
      const dx=x2-x1,dy=y2-y1,L=Math.hypot(dx,dy);
      if(L<1) return;
      X.save(); X.translate(x1,y1); X.rotate(Math.atan2(dy,dx));
      const g=X.createLinearGradient(0,-r,0,r);
      const hi=fl?'#fff':shade(col,30), sh=fl?'#fff':shade(col,-40);
      g.addColorStop(0,hi); g.addColorStop(.35,fl?'#fff':col); g.addColorStop(1,sh);
      X.fillStyle=g;
      X.beginPath(); X.roundRect(0,-r,L,r*2,r*.9); X.fill();
      X.restore();
    };
    const ball=(x,y,r,col)=>{
      const g=X.createRadialGradient(x-r*.3,y-r*.3,0,x,y,r);
      g.addColorStop(0,fl?'#fff':shade(col,30)); g.addColorStop(1,fl?'#fff':shade(col,-30));
      X.fillStyle=g; X.beginPath(); X.arc(x,y,r,0,Math.PI*2); X.fill();
    };

    // ═══════════════ LEGS ════════════════════════════════════════════════════
    const giD=shade(gi,-28), skD=shade(sk,-35);
    // Y positions
    const hipY=-74, kneeY=-42;

    if(dead){
      // fallen pose
      limb(-14,hipY,-34,0, 10,sk); limb(8,hipY,26,0, 10,sk);
      limb(-34,-18,-38,0, 11,gi); limb(26,-18,30,0, 11,gi);
    } else if(cr){
      // deep crouch – wide stance, bent knees
      limb(-22,0,-10,kneeY+12, 10,sk); limb(22,0,10,kneeY+12, 10,sk);
      limb(-10,kneeY+12,-6,hipY, 11,gi); limb(10,kneeY+12,6,hipY, 11,gi);
    } else if(!this.onG){
      // tuck jump
      limb(-16,-8,-8,kneeY+16, 10,sk); limb(16,-8,8,kneeY+16, 10,sk);
      limb(-8,kneeY+16,-5,hipY+8, 11,gi); limb(8,kneeY+16,5,hipY+8, 11,gi);
    } else if(atk&&at==='kick'){
      // planted leg
      limb(-10,0,-7,kneeY, 10,sk); limb(-7,kneeY,-5,hipY, 11,gi);
      // kick leg
      limb(5,hipY,28,kneeY+14, 11,gi); limb(28,kneeY+14,58,kneeY+22, 10,sk);
    } else if(wlk){
      // walk cycle
      const la=-6+sw*17, ra=6-sw*17;
      const lkx=-8+sw*8, lky=kneeY+Math.abs(sw)*12;
      const rkx=8-sw*8,  rky=kneeY-Math.abs(sw)*12;
      limb(la,0,lkx,lky, 10,sk); limb(ra,0,rkx,rky, 10,sk);
      limb(lkx,lky,-6,hipY, 11,gi); limb(rkx,rky,6,hipY, 11,gi);
    } else {
      // idle stance (slight V)
      limb(-10,0,-7,kneeY, 10,sk); limb(10,0,7,kneeY, 10,sk);
      limb(-7,kneeY,-5,hipY, 11,gi); limb(7,kneeY,5,hipY, 11,gi);
    }

    // ═══════════════ FEET ════════════════════════════════════════════════════
    const foot=(fx,fy)=>{
      X.fillStyle=fl?'#fff':'#1a0a00';
      X.beginPath(); X.ellipse(fx+7,fy,14,5,.05,0,Math.PI*2); X.fill();
      X.fillStyle=fl?'#fff':'#2e1200';
      X.beginPath(); X.roundRect(fx-2,fy-6,18,7,2); X.fill();
    };
    if(!dead){
      if(atk&&at==='kick'){ foot(58,kneeY+22); foot(-10,0); }
      else if(!this.onG){ foot(-16,-8); foot(16,-8); }
      else if(cr){ foot(-22,0); foot(22,0); }
      else if(wlk){ foot(-6+sw*17,0); foot(6-sw*17,0); }
      else{ foot(-10,0); foot(10,0); }
    }

    // ═══════════════ TORSO ═══════════════════════════════════════════════════
    const chestY=-114, shlY=-122;
    // slight torso rotation for attacks
    const torsoRot = atk&&at==='punch'?.12 : atk&&at==='uppercut'?-.10 : atk&&at==='kick'?.15 : 0;
    X.save(); X.translate(0,hipY); X.rotate(torsoRot);
    // main gi body
    const tg=X.createLinearGradient(-15,-50,15,-50);
    tg.addColorStop(0,fl?'#fff':shade(gi,-22));
    tg.addColorStop(.5,fl?'#fff':gi);
    tg.addColorStop(1,fl?'#fff':shade(gi,-30));
    X.fillStyle=tg;
    X.beginPath();
    X.moveTo(-14,0); X.lineTo(14,0); X.lineTo(12,-52); X.lineTo(-12,-52); X.closePath(); X.fill();
    // gi folds
    if(!fl){
      X.strokeStyle='rgba(0,0,0,.15)'; X.lineWidth=1.2;
      X.beginPath(); X.moveTo(-3,0); X.quadraticCurveTo(-2,-20,0,-28); X.stroke();
      X.beginPath(); X.moveTo(3,0); X.quadraticCurveTo(2,-18,0,-26); X.stroke();
    }
    // lapel V (skin showing)
    X.fillStyle=fl?'#fff':sk;
    X.beginPath(); X.moveTo(-4,-2); X.lineTo(0,-48); X.lineTo(4,-2); X.closePath(); X.fill();
    // lapel flap shading
    X.fillStyle=fl?'#fff':shade(gi,-15);
    X.beginPath(); X.moveTo(-4,-2); X.lineTo(-6,-24); X.lineTo(0,-28); X.closePath(); X.fill();
    X.beginPath(); X.moveTo(4,-2); X.lineTo(6,-24); X.lineTo(0,-28); X.closePath(); X.fill();
    X.restore();

    // Belt
    X.save(); X.translate(0,-76);
    X.fillStyle=fl?'#fff':be;
    X.beginPath(); X.roundRect(-14,-4,28,8,2); X.fill();
    // belt knot
    ball(0,0,5,fl?'#fff':shade(be,20));
    // belt tails
    X.fillStyle=fl?'#fff':be;
    X.beginPath(); X.moveTo(-8,4); X.lineTo(-3,18); X.lineTo(3,18); X.lineTo(8,4); X.closePath(); X.fill();
    X.restore();

    // ═══════════════ ARMS ════════════════════════════════════════════════════
    // compute arm positions from current state
    let lEx,lEy,lHx,lHy,rEx,rEy,rHx,rHy;

    if(dead){
      lEx=-28;lEy=shlY+22;lHx=-44;lHy=shlY+42;
      rEx= 28;rEy=shlY+22;rHx= 44;rHy=shlY+42;
    } else if(blk){
      lEx=18;lEy=shlY+16;lHx=22;lHy=shlY+0;
      rEx=22;rEy=shlY+20;rHx=26;rHy=shlY+4;
    } else if(atk&&at==='punch'){
      lEx=-18;lEy=shlY+20;lHx=-22;lHy=shlY+12;
      rEx=26;rEy=shlY+12;rHx=56;rHy=shlY+10;
    } else if(atk&&at==='uppercut'){
      lEx=-16;lEy=shlY+20;lHx=-18;lHy=shlY+10;
      rEx=12;rEy=shlY+8;rHx=18;rHy=shlY-20;
    } else if(atk&&at==='kick'){
      lEx=-24;lEy=shlY+14;lHx=-36;lHy=shlY+6;
      rEx=20;rEy=shlY+16;rHx=30;rHy=shlY+6;
    } else if(atk&&at==='ki'){
      lEx=16;lEy=shlY+16;lHx=40;lHy=shlY+14;
      rEx=18;rEy=shlY+20;rHx=42;rHy=shlY+18;
    } else if(hurt){
      lEx=-22;lEy=shlY+10;lHx=-34;lHy=shlY+2;
      rEx=22;rEy=shlY+10;rHx=34;rHy=shlY+2;
    } else if(wlk){
      lEx=-16+sw*4;lEy=shlY+18;lHx=-20+sw*10;lHy=shlY+34+sw*5;
      rEx=16-sw*4;rEy=shlY+18;rHx=20-sw*10;rHy=shlY+34-sw*5;
    } else {
      // kung-fu guard idle
      lEx=14+br*.2;lEy=shlY+20;lHx=18+br*.2;lHy=shlY+8+br;
      rEx=-12;rEy=shlY+20;rHx=-14;rHy=shlY+36+br;
    }

    // upper arms (gi sleeves)
    limb(-10,shlY,lEx,lEy,8,gi); limb(10,shlY,rEx,rEy,8,gi);
    // forearms (skin)
    limb(lEx,lEy,lHx,lHy,6.5,sk); limb(rEx,rEy,rHx,rHy,6.5,sk);
    // shoulder joints
    ball(-10,shlY,9,gi); ball(10,shlY,9,gi);
    // elbow joints
    ball(lEx,lEy,6,sk); ball(rEx,rEy,6,sk);

    // ═══════════════ FISTS / HANDS ═══════════════════════════════════════════
    const fist=(hx,hy,big)=>{
      const r=big?9.5:7.5;
      ball(hx,hy,r,sk);
      if(!fl){
        // knuckle lines
        X.strokeStyle=skD; X.lineWidth=1;
        for(let k=0;k<3;k++){ X.beginPath(); X.arc(hx,hy+k*1.8-2.5,r*.52,0.25,Math.PI-.25); X.stroke(); }
        // thumb
        X.fillStyle=shade(sk,-12);
        X.beginPath(); X.ellipse(hx+(big?-r*.75:r*.75),hy-r*.28,r*.38,r*.56,big?-.5:.5,0,Math.PI*2); X.fill();
      }
    };
    fist(lHx,lHy,false); fist(rHx,rHy,atk&&at==='punch');

    // ═══════════════ NECK ════════════════════════════════════════════════════
    limb(-3,shlY+2,3,shlY-4,5.5,sk);
    X.fillStyle=fl?'#fff':sk;
    X.beginPath(); X.ellipse(0,shlY+2,6,3,0,0,Math.PI); X.fill();

    // ═══════════════ HEAD ════════════════════════════════════════════════════
    const headX = atk&&at==='punch'?5:hurt?-8:0;
    const hy = -138+br*.4;

    X.save(); X.translate(headX,0);

    // skull
    const hg=X.createRadialGradient(-3,hy-4,0,0,hy,17);
    hg.addColorStop(0,fl?'#fff':shade(sk,30));
    hg.addColorStop(.55,fl?'#fff':sk);
    hg.addColorStop(1,fl?'#fff':shade(sk,-38));
    X.fillStyle=hg;
    X.beginPath(); X.ellipse(0,hy,14,17,0,0,Math.PI*2); X.fill();

    // jaw
    X.fillStyle=fl?'#fff':sk;
    X.beginPath(); X.ellipse(0,hy+10,11,10,0,0,Math.PI); X.fill();

    // cheekbone highlight
    X.fillStyle=`rgba(255,200,150,.28)`;
    X.beginPath(); X.ellipse(-8,hy+2,5.5,4,-.3,0,Math.PI*2); X.fill();
    X.beginPath(); X.ellipse(8,hy+2,5.5,4,.3,0,Math.PI*2); X.fill();

    // ears
    X.fillStyle=fl?'#fff':sk;
    X.beginPath(); X.ellipse(-14.5,hy+2,4.5,6.5,.15,0,Math.PI*2); X.fill();
    X.beginPath(); X.ellipse(14.5,hy+2,4.5,6.5,-.15,0,Math.PI*2); X.fill();
    if(!fl){
      X.fillStyle=shade(sk,-20);
      X.beginPath(); X.ellipse(-14.5,hy+2,2.5,4,.15,0,Math.PI*2); X.fill();
    }

    if(dead){
      X.strokeStyle='rgba(80,40,10,.9)'; X.lineWidth=2.5; X.lineCap='round';
      for(const ex of [-6,4]){
        X.beginPath();X.moveTo(ex-3.5,hy-4.5);X.lineTo(ex+3.5,hy+3.5);X.stroke();
        X.beginPath();X.moveTo(ex+3.5,hy-4.5);X.lineTo(ex-3.5,hy+3.5);X.stroke();
      }
    } else {
      // eyebrows
      const browTilt = hurt?.18:atk?-.08:blk?.10:0;
      X.strokeStyle=fl?'#fff':ha; X.lineWidth=2.3; X.lineCap='round';
      X.save(); X.translate(-5.5,hy-9); X.rotate(-browTilt-.04);
      X.beginPath(); X.moveTo(-4.5,0); X.quadraticCurveTo(-.5,-2.5,3.5,0); X.stroke(); X.restore();
      X.save(); X.translate(5.5,hy-9); X.rotate(browTilt+.04);
      X.beginPath(); X.moveTo(-3.5,0); X.quadraticCurveTo(.5,-2.5,4.5,0); X.stroke(); X.restore();

      // eye socket depth
      X.fillStyle='rgba(0,0,0,.07)';
      X.beginPath(); X.ellipse(-5.5,hy-1.5,5,3.8,0,0,Math.PI*2); X.fill();
      X.beginPath(); X.ellipse(5.5,hy-1.5,5,3.8,0,0,Math.PI*2); X.fill();

      // eye whites
      X.fillStyle=fl?'#fff':'#f5f0e8';
      X.beginPath(); X.ellipse(-5.5,hy-1.5,4.2,3.2,0,0,Math.PI*2); X.fill();
      X.beginPath(); X.ellipse(5.5,hy-1.5,4.2,3.2,0,0,Math.PI*2); X.fill();

      // iris
      const irisC=this.ai?'#7a1a00':'#004466';
      X.fillStyle=fl?'#fff':irisC;
      X.beginPath(); X.arc(-5.5,hy-1.5,2.6,0,Math.PI*2); X.fill();
      X.beginPath(); X.arc(5.5,hy-1.5,2.6,0,Math.PI*2); X.fill();
      // pupil
      X.fillStyle=fl?'#fff':'#080400';
      X.beginPath(); X.arc(-5,hy-1.5,1.3,0,Math.PI*2); X.fill();
      X.beginPath(); X.arc(6,hy-1.5,1.3,0,Math.PI*2); X.fill();
      // eye shine
      X.fillStyle='rgba(255,255,255,.78)';
      X.beginPath(); X.arc(-4.2,hy-2.5,.85,0,Math.PI*2); X.fill();
      X.beginPath(); X.arc(6.8,hy-2.5,.85,0,Math.PI*2); X.fill();

      // nose bridge + tip
      X.fillStyle=shade(sk,-14);
      X.beginPath();
      X.moveTo(1,hy-2); X.quadraticCurveTo(4,hy+2,3,hy+5.5);
      X.quadraticCurveTo(1,hy+7,-1,hy+5.5);
      X.quadraticCurveTo(-2,hy+2,1,hy-2); X.fill();
      X.fillStyle='rgba(0,0,0,.14)';
      X.beginPath(); X.ellipse(-2.5,hy+5.5,2,1.5,-.3,0,Math.PI*2); X.fill();
      X.beginPath(); X.ellipse(3.5,hy+5.5,2,1.5,.3,0,Math.PI*2); X.fill();

      // mouth
      const lipC=fl?'#fff':shade(sk,-24);
      if(atk){
        // open shout
        X.fillStyle=lipC;
        X.beginPath(); X.ellipse(0,hy+10,4.5,3.5,0,0,Math.PI*2); X.fill();
        X.fillStyle='#1a0500';
        X.beginPath(); X.ellipse(0,hy+10.5,3.5,2.5,0,0,Math.PI*2); X.fill();
        // upper teeth
        X.fillStyle='#f5f0e8';
        X.beginPath(); X.roundRect(-3,hy+8.5,6,2.5,1); X.fill();
      } else if(hurt){
        X.strokeStyle=lipC; X.lineWidth=1.8;
        X.beginPath(); X.moveTo(-4,hy+10); X.quadraticCurveTo(0,hy+8,4,hy+10); X.stroke();
      } else {
        X.fillStyle=lipC;
        X.beginPath(); X.moveTo(-4.5,hy+9); X.quadraticCurveTo(0,hy+12,4.5,hy+9); X.fill();
        X.fillStyle=shade(lipC,-12);
        X.beginPath(); X.moveTo(-4.5,hy+9); X.quadraticCurveTo(-1,hy+8,0,hy+9);
        X.quadraticCurveTo(1,hy+8,4.5,hy+9); X.fill();
      }
    }

    // ── HAIR ─────────────────────────────────────────────────────────────────
    X.fillStyle=fl?'#fff':ha;
    X.beginPath(); X.ellipse(0,hy-12,14,10,0,Math.PI,Math.PI*2); X.fill();
    X.beginPath(); X.ellipse(-13,hy-2,3.5,6,.1,0,Math.PI*2); X.fill();
    X.beginPath(); X.ellipse(13,hy-2,3.5,6,-.1,0,Math.PI*2); X.fill();
    if(!fl){
      // hair strands
      X.strokeStyle=shade(ha,18); X.lineWidth=1.5; X.lineCap='round';
      for(let i=-3;i<=3;i++){
        X.beginPath(); X.moveTo(i*3.5,hy-17);
        X.quadraticCurveTo(i*4.5,hy-21,i*3+.5,hy-25); X.stroke();
      }
    }
    // headband
    const hbC=this.ai?'#cc2000':'#cc7700';
    X.fillStyle=fl?'#fff':hbC;
    X.beginPath(); X.roundRect(-15,hy-9,30,5.5,2); X.fill();
    if(!fl){
      // headband zig-zag pattern
      X.strokeStyle='rgba(255,255,180,.45)'; X.lineWidth=1.2;
      X.beginPath();
      for(let i=-12;i<=12;i+=4) X.lineTo(i,hy+(i%8===0?-5:-8));
      X.stroke();
    }
    X.restore(); // end head translate

    // ── HP bar ────────────────────────────────────────────────────────────────
    X.save(); X.scale(1/this.f,1);
    const bw=54, bh=5, bhY=hy-40;
    X.fillStyle='rgba(0,0,0,.55)'; X.fillRect(-bw/2,bhY,bw,bh+2);
    const hp=this.hp/MHP;
    X.fillStyle=hp>.5?'#44ff88':hp>.25?'#ffdd00':'#ff2244';
    X.fillRect(-bw/2,bhY,bw*hp,bh);
    X.strokeStyle='rgba(255,255,255,.18)'; X.lineWidth=1;
    X.strokeRect(-bw/2,bhY,bw,bh+2);
    X.restore();

    X.restore(); // end fighter
  }
}

// ── game
const keys={};
let p1,ai,projs,gs='start';
let roundTime=RT,roundTimer=60,rmt=0,p1W=0,aiW=0;

function newRound(){
  // P1: warm skin, white gi, green belt, dark hair
  p1=new Fighter(190,'#e0b882','#f2f0e2','#1a8844','#18100a',1,false);
  // AI: similar skin, red gi, black belt
  ai=new Fighter(630,'#d4a870','#c82200','#111111','#0e0804',-1,true);
  projs=[]; roundTime=RT; roundTimer=60;
  gs='roundStart'; showM('ROUND '+(p1W+aiW+1),85);
}
const showM=(m,d=90)=>{rmt=d;const e=document.getElementById('rmsg');e.textContent=m;e.style.opacity='1';};
const hideM=()=>{document.getElementById('rmsg').style.opacity='0';};

function hits(){
  if(p1.aBox){
    const ar={x:ai.x-22,y:ai.y-96,w:44,h:96};
    if(ov(p1.aBox,ar)){
      ai.hit(p1.aDmg,p1.f*2.8);
      ai.trackMove(p1.aType); // AI remembers what player used
      p1.aBox=null;
      p1.combo++; p1.comboT=68;
    }
  }
  if(ai.aBox){
    const pr={x:p1.x-22,y:p1.y-96,w:44,h:96};
    if(ov(ai.aBox,pr)){ p1.hit(ai.aDmg,ai.f*2.8); ai.aBox=null; }
  }
  for(const b of projs){
    if(!b.alive)continue;
    const tgt=b.own===0?ai:p1;
    if(Math.abs(b.x-tgt.x)<30&&Math.abs(b.y-(tgt.y-66))<33){
      tgt.hit(16,b.vx*.35); b.alive=false;
      if(b.own===0){ai.trackMove('ki');}
    }
  }
}
function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function hud(){
  document.getElementById('p1b').style.width=(p1.hp/MHP*100)+'%';
  document.getElementById('p2b').style.width=(ai.hp/MHP*100)+'%';
  document.getElementById('timer').textContent=Math.ceil(roundTime);
}
function aiDbg(){
  const h=ai.hist, hl=Math.max(1,h.length);
  const kp=(h.filter(m=>m==='kick').length/hl*100).toFixed(0);
  const pp=(h.filter(m=>m==='punch').length/hl*100).toFixed(0);
  document.getElementById('aiinfo').innerHTML=
    `IA: <b>${ai.mode}</b> | kick ${kp}% punch ${pp}%<br>blkCD:${ai.blkCD} punish:${ai.punishT}`;
}

function zs(f){const d=Math.abs(f.x-W/2)/(W/2);return .97-d*.05;}
function zo(f){const d=Math.abs(f.x-W/2)/(W/2);return d*5;}

function drawStart(){
  X.fillStyle='rgba(0,0,0,.68)'; X.fillRect(0,0,W,H);
  X.textAlign='center';
  X.fillStyle='#ffd700'; X.font='bold 52px Georgia,serif';
  X.shadowColor='#ffd700'; X.shadowBlur=32;
  X.fillText('KUNG FU ARENA',W/2,120); X.shadowBlur=0;
  X.fillStyle='#cc4400'; X.font='bold 16px Courier New';
  X.fillText('☯  CHEN  vs  HONG  ☯',W/2,158);
  X.fillStyle='#ccc'; X.font='14px Courier New';
  X.fillText('A/D bouger  ·  W sauter  ·  S garde',W/2,214);
  X.fillText('U poing  ·  I pied  ·  O uppercut  ·  J ki blast',W/2,238);
  X.fillStyle='#ffcc66'; X.font='12px Courier New';
  X.fillText("⚠ L'IA lit tes combos et contre tes spams",W/2,268);
  X.fillStyle='#ffd700'; X.globalAlpha=.6+Math.sin(Date.now()*.004)*.4;
  X.font='bold 20px Courier New';
  X.fillText('[ ENTRÉE POUR COMMENCER ]',W/2,316);
  X.globalAlpha=1; X.textAlign='left';
}
function drawOver(){
  X.fillStyle='rgba(0,0,0,.75)'; X.fillRect(0,0,W,H);
  X.textAlign='center';
  const wn=p1W>aiW?'CHEN':'HONG';
  X.fillStyle=p1W>aiW?'#44ff88':'#ff7722';
  X.font='bold 52px Georgia,serif';
  X.shadowColor=X.fillStyle; X.shadowBlur=32;
  X.fillText(wn+' GAGNE !',W/2,158); X.shadowBlur=0;
  X.fillStyle='#bbb'; X.font='16px Courier New';
  X.fillText('Score  Chen '+p1W+'  —  Hong '+aiW,W/2,204);
  X.fillStyle='#ffd700'; X.globalAlpha=.6+Math.sin(Date.now()*.004)*.4;
  X.font='bold 18px Courier New';
  X.fillText('[ ENTRÉE pour rejouer ]',W/2,272);
  X.globalAlpha=1; X.textAlign='left';
}

let lt=0;
function loop(ts){
  const dt=Math.min((ts-lt)/16.67,3); lt=ts;
  drawBG();

  if(gs==='start'){drawStart();requestAnimationFrame(loop);return;}

  if(gs==='roundStart'){
    p1.draw(zs(p1),zo(p1)); ai.draw(zs(ai),zo(ai));
    if(--rmt<=0){hideM();showM('FIGHT!',48);gs='fight';}
    hud(); requestAnimationFrame(loop); return;
  }

  if(gs==='fight'){
    if(--roundTimer<=0){roundTime-=1/60;roundTimer=60;}
    p1.update(keys,ai,projs); ai.update(keys,p1,projs);
    for(const b of projs) b.update();
    projs=projs.filter(b=>b.alive);
    hits(); hud(); aiDbg();

    const[fr,bk]=p1.x<ai.x?[ai,p1]:[p1,ai];
    bk.draw(zs(bk),zo(bk));
    for(const b of projs) b.draw();
    fr.draw(zs(fr),zo(fr));

    const cd=document.getElementById('cdisplay');
    if(p1.combo>=2&&p1.comboT>0){cd.textContent=p1.combo+' HIT COMBO!';cd.style.opacity='1';}
    else cd.style.opacity='0';

    if(p1.hp<=0||ai.hp<=0||roundTime<=0){
      let msg;
      if(roundTime<=0){if(p1.hp>ai.hp){p1W++;msg='CHEN WINS!';}else if(ai.hp>p1.hp){aiW++;msg='HONG WINS!';}else msg='DRAW!';}
      else if(p1.hp<=0){aiW++;msg='HONG WINS!';}
      else{p1W++;msg='CHEN WINS!';}
      showM(msg,130); gs='roundEnd';
    }
    if(--rmt<=0) hideM();
  }

  if(gs==='roundEnd'){
    p1.update(keys,ai,projs); ai.update(keys,p1,projs);
    const[fr,bk]=p1.x<ai.x?[ai,p1]:[p1,ai];
    bk.draw(zs(bk),zo(bk));
    for(const b of projs) b.draw();
    fr.draw(zs(fr),zo(fr));
    hud(); if(--rmt<=0){hideM();if(p1W>=2||aiW>=2)gs='gameover';else newRound();}
  }

  if(gs==='gameover'){
    const[fr,bk]=p1.x<ai.x?[ai,p1]:[p1,ai];
    bk.draw(zs(bk),zo(bk)); fr.draw(zs(fr),zo(fr));
    drawOver();
  }
  requestAnimationFrame(loop);
}

window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Enter'&&(gs==='start'||gs==='gameover')){p1W=0;aiW=0;newRound();}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

newRound(); gs='start'; requestAnimationFrame(loop);
</script>
</body>
</html>

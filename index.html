<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kung Fu Arena</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0600;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  font-family:'Georgia',serif;
  color:#fff; overflow:hidden;
}
h1 { font-size:1.5rem; color:#c8860a; text-shadow:0 0 18px #c8860a99; margin-bottom:4px; letter-spacing:6px; }
#game-wrapper { position:relative; border:3px solid #8b4a00; box-shadow:0 0 50px #8b4a0066; }
canvas { display:block; }
#hud {
  display:flex; justify-content:space-between; align-items:center;
  width:820px; padding:5px 0; gap:8px;
}
.health-bar-wrap {
  flex:1; background:#0a0400; height:22px;
  border:1px solid #6b3000; position:relative; overflow:hidden;
}
.health-bar { height:100%; transition:width 0.07s; position:relative; }
.health-bar::after {
  content:''; position:absolute; top:0; left:0; right:0;
  height:40%; background:rgba(255,255,255,0.15);
}
#p1-bar { background:linear-gradient(90deg,#008844,#44ff88); }
#p2-bar { background:linear-gradient(90deg,#cc3300,#ff8800); float:right; }
.name-tag { font-size:0.72rem; font-weight:bold; letter-spacing:2px; padding:0 6px; white-space:nowrap; }
#timer { font-size:1.4rem; font-weight:bold; color:#ffd700; min-width:40px; text-align:center; text-shadow:0 0 10px #ffd700; }
#round-msg {
  position:absolute; top:40%; left:50%; transform:translate(-50%,-50%);
  font-size:3rem; font-weight:bold; color:#ffd700;
  text-shadow:0 0 25px #ffd700, 0 2px 0 #6b3000;
  pointer-events:none; letter-spacing:7px; z-index:10;
  opacity:0; transition:opacity 0.25s;
}
#controls {
  margin-top:6px; display:flex; gap:18px;
  font-size:0.62rem; color:#887766; max-width:820px;
}
.key { background:#1a0800; border:1px solid #6b3000; padding:1px 5px; border-radius:3px; color:#ffcc66; display:inline-block; }
#combo-display {
  position:absolute; bottom:8px; left:10px;
  font-size:0.9rem; color:#ffd700; pointer-events:none;
  font-weight:bold; text-shadow:0 0 10px #ffd700;
}
#ai-debug {
  position:absolute; top:6px; right:8px;
  font-size:0.55rem; color:rgba(255,150,50,0.6);
  pointer-events:none; text-align:right; line-height:1.4;
}
</style>
</head>
<body>
<h1>☯ KUNG FU ARENA ☯</h1>
<div id="hud">
  <span class="name-tag" style="color:#44ff88">🐉 CHEN</span>
  <div class="health-bar-wrap"><div class="health-bar" id="p1-bar" style="width:100%"></div></div>
  <div id="timer">60</div>
  <div class="health-bar-wrap"><div class="health-bar" id="p2-bar" style="width:100%;float:right"></div></div>
  <span class="name-tag" style="color:#ff8800">HONG 🔥</span>
</div>
<div id="game-wrapper">
  <canvas id="c" width="820" height="430"></canvas>
  <div id="round-msg">FIGHT!</div>
  <div id="combo-display"></div>
  <div id="ai-debug"></div>
</div>
<div id="controls">
  <span><span class="key">A</span><span class="key">D</span> bouger &nbsp;
        <span class="key">W</span> sauter &nbsp;
        <span class="key">S</span> garde</span>
  <span><span class="key">U</span> poing &nbsp;
        <span class="key">I</span> pied &nbsp;
        <span class="key">O</span> uppercut &nbsp;
        <span class="key">J</span> ki blast</span>
</div>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// CANVAS / CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND   = H - 68;
const GRAVITY  = 0.60;
const JUMP_V   = -15.5;
const SPEED    = 3.8;
const MAX_HP   = 100;
const ROUND_T  = 60;

// ─────────────────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────────────────
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function shadeHex(hex, amt) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(v=>clamp(v+amt,0,255).toString(16).padStart(2,'0')).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// BACKGROUND
// ─────────────────────────────────────────────────────────────────────────────
const clouds=[];
for(let i=0;i<8;i++) clouds.push({x:Math.random()*W,y:25+Math.random()*80,w:55+Math.random()*90,spd:0.1+Math.random()*0.2});

function drawBG(){
  // sky
  const sky=ctx.createLinearGradient(0,0,0,GROUND);
  sky.addColorStop(0,'#4aa8e8'); sky.addColorStop(0.5,'#87ceeb'); sky.addColorStop(1,'#c8e8f5');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,GROUND);

  // far hills
  const hillGrad=ctx.createLinearGradient(0,GROUND-110,0,GROUND);
  hillGrad.addColorStop(0,'#7ab870'); hillGrad.addColorStop(1,'#4a8840');
  ctx.fillStyle=hillGrad;
  ctx.beginPath(); ctx.moveTo(0,GROUND);
  for(let x=0;x<=W;x+=4){
    const y=GROUND-80-Math.sin(x*.011)*50-Math.sin(x*.023+1)*28-Math.sin(x*.007+2)*22;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.lineTo(W,GROUND); ctx.closePath(); ctx.fill();

  // near hills
  const h2=ctx.createLinearGradient(0,GROUND-60,0,GROUND);
  h2.addColorStop(0,'#98d480'); h2.addColorStop(1,'#5a9845');
  ctx.fillStyle=h2;
  ctx.beginPath(); ctx.moveTo(0,GROUND);
  for(let x=0;x<=W;x+=4){
    const y=GROUND-42-Math.sin(x*.019+.4)*32-Math.sin(x*.033+2)*14;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.lineTo(W,GROUND); ctx.closePath(); ctx.fill();

  // clouds
  for(const c of clouds){
    c.x+=c.spd; if(c.x>W+110)c.x=-120;
    ctx.save(); ctx.globalAlpha=0.88;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w*.5,17,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-c.w*.22,c.y+5,c.w*.3,13,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*.22,c.y+3,c.w*.33,15,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // pagodas
  drawPagoda(75, GROUND-28,0.6);
  drawPagoda(690,GROUND-28,0.48);

  // cherry trees
  drawTree(155,GROUND,0.8);
  drawTree(630,GROUND,0.75);

  // arena floor
  const fl=ctx.createLinearGradient(0,GROUND,0,H);
  fl.addColorStop(0,'#c49870'); fl.addColorStop(.5,'#a07848'); fl.addColorStop(1,'#6b4828');
  ctx.fillStyle=fl; ctx.fillRect(0,GROUND,W,H-GROUND);

  // floor tiles
  ctx.save();
  for(let c=-7;c<=7;c++){
    ctx.strokeStyle='rgba(70,35,8,.3)'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(W/2+c*52,GROUND); ctx.lineTo(W/2+c*600,H+300); ctx.stroke();
  }
  for(let row=0;row<6;row++){
    const y=GROUND+12+row*26;
    ctx.strokeStyle='rgba(70,35,8,.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  ctx.restore();

  // floor glow
  ctx.fillStyle='rgba(255,210,130,.14)'; ctx.fillRect(0,GROUND,W,7);
  ctx.save();
  ctx.strokeStyle='#c03000'; ctx.lineWidth=3;
  ctx.shadowColor='#c03000'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(W,GROUND); ctx.stroke();
  ctx.restore();

  // pillars
  drawPillar(22,GROUND-85); drawPillar(W-22,GROUND-85);
  drawBanner();
}

function drawPagoda(x,y,s){
  ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  ctx.fillStyle='rgba(55,25,8,.58)';
  for(let i=0;i<4;i++){
    const lw=52-i*9,ly=-i*34;
    ctx.fillRect(-lw/2,ly-30,lw,30);
    ctx.beginPath(); ctx.moveTo(-lw/2-12,ly); ctx.lineTo(0,ly-12); ctx.lineTo(lw/2+12,ly); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}
function drawTree(x,y,s){
  ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  ctx.fillStyle='#5a3010'; ctx.fillRect(-5,-65,10,65); ctx.fillRect(-3,-105,7,44);
  const cols=['rgba(255,180,190,.82)','rgba(255,155,175,.72)','rgba(255,200,210,.76)'];
  for(let i=0;i<20;i++){
    const a=(i/20)*Math.PI*2,r=30+Math.sin(i*2.1)*9;
    const px=Math.cos(a)*r,py=-105+Math.sin(a)*r*.65;
    ctx.fillStyle=cols[i%3]; ctx.beginPath(); ctx.arc(px,py,11+Math.sin(i)*3,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='rgba(255,145,165,.62)'; ctx.beginPath(); ctx.arc(0,-105,24,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawPillar(x,y){
  ctx.save(); ctx.translate(x,y);
  const cg=ctx.createLinearGradient(-9,0,9,0);
  cg.addColorStop(0,'#7a3a00'); cg.addColorStop(.4,'#d4822a'); cg.addColorStop(1,'#7a3a00');
  ctx.fillStyle=cg; ctx.fillRect(-7,0,14,85);
  ctx.fillStyle='#c0600a'; ctx.fillRect(-13,-9,26,11); ctx.fillRect(-10,0,20,7);
  ctx.restore();
}
function drawBanner(){
  ctx.save(); ctx.translate(W/2,8);
  ctx.strokeStyle='#7a3a00'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-130,0); ctx.lineTo(130,0); ctx.stroke();
  for(const [lx,lc] of [[-90,'#cc2200'],[-35,'#ffaa00'],[35,'#cc2200'],[90,'#ffaa00']]){
    ctx.fillStyle=lc; ctx.shadowColor=lc; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.ellipse(lx,18,7,11,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='rgba(255,255,200,.55)'; ctx.beginPath(); ctx.ellipse(lx-2,15,2.5,3.5,0,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0; ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// PROJECTILE
// ─────────────────────────────────────────────────────────────────────────────
class Projectile {
  constructor(x,y,dir,owner){ this.x=x;this.y=y;this.vx=dir*7.8;this.owner=owner;this.alive=true;this.t=0; }
  update(){ this.x+=this.vx;this.t+=.22;if(this.x<-30||this.x>W+30)this.alive=false; }
  draw(){
    ctx.save(); ctx.translate(this.x,this.y);
    const c=this.owner===0?'#44ffaa':'#ff8822';
    ctx.shadowColor=c; ctx.shadowBlur=24;
    ctx.strokeStyle=c; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.stroke();
    const g=ctx.createRadialGradient(0,0,0,0,0,11);
    g.addColorStop(0,'rgba(255,255,255,.9)'); g.addColorStop(.4,c); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
    ctx.rotate(this.t*2.2); ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1.5;
    for(let i=0;i<4;i++){
      ctx.save(); ctx.rotate(i*Math.PI/2);
      ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(0,-13); ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// FIGHTER
// ─────────────────────────────────────────────────────────────────────────────
class Fighter {
  constructor(x,skin,gi,belt,hair,facing,isAI){
    this.x=x; this.y=GROUND;
    this.vx=0; this.vy=0;
    this.skin=skin; this.gi=gi; this.belt=belt; this.hair=hair;
    this.facing=facing; this.isAI=isAI;
    this.hp=MAX_HP;
    this.state='idle'; this.prevState='idle';
    this.stateTimer=0;
    this.attackBox=null; this.attackDmg=0; this.attackType='punch';
    this.onGround=true;
    this.comboCount=0; this.comboTimer=0;
    this.hadoukenCD=0;
    // animation lerp
    this.pose=this._getPose('idle',0);
    this.poseTarget=this._getPose('idle',0);
    this.poseLerp=1;
    this.walkT=0; this.breathT=Math.random()*Math.PI*2;
    this.hitFlash=0; this.shakeX=0;
    this.squash=1; // landing squash
    // AI brain
    this.aiTimer=0;
    this.blocking=false; this.crouching=false;
    this.aiMode='neutral'; // neutral, aggressive, defensive, counter
    this.playerHistory=[]; // last N move types player used
    this.blockCooldown=0;
    this.dashCooldown=0;
    this.aiPatience=0; // how long AI waits before acting
    this.lastHitTime=0;
    this.hitsReceived=0;
    this.consecutiveKicksTaken=0;
  }

  // ── POSES (skeleton key positions) ─────────────────────────────────────────
  // Returns {lKneeX,lKneeY,lAnkX,lAnkY, rKneeX,rKneeY,rAnkX,rAnkY,
  //          hipRot, torsoRot, lElbX,lElbY,lHandX,lHandY, rElbX,rElbY,rHandX,rHandY, headX,headY}
  _getPose(state,T,at){
    const sw=Math.sin(T);
    const poses={
      idle:{
        lAnk:-10,rAnk:10,lKneeX:-9,lKneeY:-42,rKneeX:9,rKneeY:-42,
        lElbX:-18,lElbY:-100,lHx:-22,lHy:-88, rElbX:16,rElbY:-96,rHx:20,rHy:-82,
        hipRot:0,headX:0,breath:true
      },
      walk:{
        lAnk:-6+sw*18,rAnk:6-sw*18,lKneeX:-8+sw*7,lKneeY:-40+Math.abs(sw)*12,rKneeX:8-sw*7,rKneeY:-40-Math.abs(sw)*12,
        lElbX:-16+sw*5,lElbY:-100,lHx:-20+sw*10,lHy:-86+sw*6, rElbX:16-sw*5,rElbY:-98,rHx:20-sw*10,rHy:-85-sw*6,
        hipRot:sw*.04,headX:0,breath:false
      },
      jump:{
        lAnk:-14,rAnk:14,lKneeX:-12,lKneeY:-32,rKneeX:12,rKneeY:-32,
        lElbX:-22,lElbY:-108,lHx:-26,lHy:-96, rElbX:22,rElbY:-108,rHx:26,rHy:-96,
        hipRot:-.06,headX:0,breath:false
      },
      crouch:{
        lAnk:-22,rAnk:22,lKneeX:-14,lKneeY:-24,rKneeX:14,rKneeY:-24,
        lElbX:16,lElbY:-65,lHx:20,lHy:-52, rElbX:20,rElbY:-68,rHx:24,rHy:-54,
        hipRot:.05,headX:0,breath:false
      },
      block:{
        lAnk:-8,rAnk:8,lKneeX:-7,lKneeY:-42,rKneeX:7,rKneeY:-42,
        lElbX:16,lElbY:-108,lHx:20,lHy:-96, rElbX:20,rElbY:-104,rHx:24,rHy:-94,
        hipRot:0,headX:0,breath:false
      },
      punch:{
        lAnk:-10,rAnk:10,lKneeX:-9,lKneeY:-44,rKneeX:9,rKneeY:-44,
        lElbX:-18,lElbY:-102,lHx:-22,lHy:-90, rElbX:28,rElbY:-106,rHx:58,rHy:-104,
        hipRot:.12,headX:4,breath:false
      },
      kick:{
        lAnk:-10,rAnk:-10,lKneeX:-8,lKneeY:-44,rKneeX:0,rKneeY:-44,
        lElbX:-24,lElbY:-100,lHx:-36,lHy:-92, rElbX:22,rElbY:-98,rHx:32,rHy:-90,
        hipRot:.18,headX:2,breath:false,
        kickKneeX:26,kickKneeY:-38,kickAnkX:56,kickAnkY:-30
      },
      uppercut:{
        lAnk:-10,rAnk:10,lKneeX:-9,lKneeY:-44,rKneeX:9,rKneeY:-44,
        lElbX:-16,lElbY:-102,lHx:-18,lHy:-92, rElbX:14,rElbY:-112,rHx:20,rHy:-132,
        hipRot:-.08,headX:-2,breath:false
      },
      hadouken:{
        lAnk:-10,rAnk:10,lKneeX:-9,lKneeY:-44,rKneeX:9,rKneeY:-44,
        lElbX:16,lElbY:-100,lHx:40,lHy:-98, rElbX:18,rElbY:-104,rHx:42,rHy:-102,
        hipRot:.08,headX:2,breath:false
      },
      hurt:{
        lAnk:-8,rAnk:8,lKneeX:-7,lKneeY:-40,rKneeX:7,rKneeY:-40,
        lElbX:-24,lElbY:-104,lHx:-36,lHy:-98, rElbX:24,rElbY:-104,rHx:36,rHy:-98,
        hipRot:-.12,headX:-6,breath:false
      },
      dead:{
        lAnk:-30,rAnk:20,lKneeX:-20,lKneeY:-18,rKneeX:12,rKneeY:-22,
        lElbX:-36,lElbY:-24,lHx:-50,lHy:-12, rElbX:28,rElbY:-18,rHx:40,rHy:-8,
        hipRot:.2,headX:-14,breath:false
      }
    };
    return poses[state]||poses.idle;
  }

  // ── ACTIONS ─────────────────────────────────────────────────────────────────
  punch(type='punch'){
    if(['attack','hurt','dead'].includes(this.state)) return false;
    this.prevState=this.state; this.state='attack'; this.attackType=type;
    this.stateTimer=type==='uppercut'?32:type==='kick'?30:22;
    this.attackDmg=type==='uppercut'?14:type==='kick'?12:9;
    const reach=type==='kick'?58:48;
    this.attackBox={x:this.x+this.facing*36,y:this.y-(type==='kick'?28:type==='uppercut'?78:58),w:reach,h:38};
    this.poseLerp=0;
    this.poseTarget=this._getPose(type,0);
    return true;
  }
  hadouken(){
    if(this.hadoukenCD>0||['hurt','dead'].includes(this.state)) return null;
    this.hadoukenCD=100; this.state='attack'; this.stateTimer=24;
    this.attackType='hadouken'; this.attackBox=null; this.attackDmg=0;
    this.poseLerp=0; this.poseTarget=this._getPose('hadouken',0);
    return new Projectile(this.x+this.facing*28,this.y-66,this.facing,this.isAI?1:0);
  }
  jump(){
    if(!this.onGround) return;
    this.vy=JUMP_V; this.onGround=false; this.state='jump';
    this.poseLerp=0; this.poseTarget=this._getPose('jump',0);
  }
  takeDamage(dmg,kb=0){
    if(this.state==='dead') return;
    const wasBlocking=this.blocking;
    if(wasBlocking) dmg=Math.max(1,Math.floor(dmg*.1));
    this.hp=Math.max(0,this.hp-dmg);
    this.hitFlash=10; this.shakeX=8;
    if(this.hp<=0){this.state='dead';this.stateTimer=9999;this.poseTarget=this._getPose('dead',0);this.poseLerp=0;return;}
    this.vx+=kb; this.state='hurt'; this.stateTimer=22; this.attackBox=null;
    this.poseLerp=0; this.poseTarget=this._getPose('hurt',0);
    this.hitsReceived++;
  }

  // ── UPDATE ───────────────────────────────────────────────────────────────────
  update(keys,opp,projs,frameNum){
    if(this.stateTimer>0) this.stateTimer--;
    if(this.hadoukenCD>0) this.hadoukenCD--;
    if(this.comboTimer>0) this.comboTimer--; else this.comboCount=0;
    if(this.hitFlash>0) this.hitFlash--;
    if(this.shakeX>0) this.shakeX-=1.8;
    if(this.blockCooldown>0) this.blockCooldown--;
    if(this.dashCooldown>0) this.dashCooldown--;

    if(this.state==='dead'){this._phys();return;}
    if(this.state==='hurt'&&this.stateTimer<=0) this.state='idle';
    if(this.state==='attack'&&this.stateTimer<=0){this.state='idle';this.attackBox=null;}

    if(this.isAI) this._ai(opp,projs,frameNum);
    else this._player(keys,opp,projs);

    this._phys();
    this.x=clamp(this.x,45,W-45);
    this.breathT+=0.03;
    if(Math.abs(this.vx)>0.1) this.walkT+=0.19;
    if(this.state!=='attack') this.facing=opp.x>this.x?1:-1;

    // update pose lerp
    this.poseLerp=clamp(this.poseLerp+0.28,0,1);
    const pstate=this.state==='attack'?this.attackType:this.state;
    if(this.state==='walk') this.poseTarget=this._getPose('walk',this.walkT);
    else if(this.state==='idle') this.poseTarget=this._getPose('idle',this.walkT);
    if(this.squash>1) this.squash=lerp(this.squash,1,0.25);
  }

  _player(keys,opp,projs){
    this.blocking=false; this.crouching=false;
    if(keys['s']||keys['ArrowDown']){
      this.crouching=true; this.blocking=true; this.state='crouch';
      this.vx*=0.72; this.poseTarget=this._getPose('crouch',0); return;
    }
    const ok=!['attack','hurt'].includes(this.state);
    if(ok){
      this.vx=0;
      if(keys['a']||keys['ArrowLeft']){this.vx=-SPEED;if(this.state!=='jump')this.state='walk';}
      if(keys['d']||keys['ArrowRight']){this.vx=SPEED;if(this.state!=='jump')this.state='walk';}
      if((keys['w']||keys['ArrowUp'])&&this.onGround) this.jump();
      if(this.vx===0&&this.state==='walk') this.state='idle';
      if(keys['u']&&!keys['_u']){if(this.punch('punch')){this._combo();} keys['_u']=true;}
      if(!keys['u']) keys['_u']=false;
      if(keys['i']&&!keys['_i']){if(this.punch('kick')){this._combo();} keys['_i']=true;}
      if(!keys['i']) keys['_i']=false;
      if(keys['o']&&!keys['_o']){if(this.punch('uppercut')){this._combo();} keys['_o']=true;}
      if(!keys['o']) keys['_o']=false;
      if(keys['j']&&!keys['_j']){const p=this.hadouken();if(p)projs.push(p);keys['_j']=true;}
      if(!keys['j']) keys['_j']=false;
    }
  }
  _combo(){ this.comboCount++;this.comboTimer=68; }

  // ── AI BRAIN ─────────────────────────────────────────────────────────────────
  // The AI analyses the player's last moves and adapts:
  // – Spamming kick → AI blocks and punishes with uppercut
  // – Spamming punch → AI backdashes and uses hadouken
  // – Jumping a lot → AI waits and uses uppercut
  // – Projectile spam → AI jumps/dashes through
  _ai(opp,projs,frame){
    this.aiTimer--;
    if(this.aiTimer>0) return;

    const dist=Math.abs(opp.x-this.x);
    const ok=!['attack','hurt'].includes(this.state);
    if(!ok){this.aiTimer=5;return;}

    this.blocking=false; this.vx=0;

    // ── analyse player history
    const recentKicks   = this.playerHistory.filter(m=>m==='kick').length;
    const recentPunches = this.playerHistory.filter(m=>m==='punch').length;
    const recentJumps   = this.playerHistory.filter(m=>m==='jump').length;
    const recentHado    = this.playerHistory.filter(m=>m==='hadouken').length;
    const histLen       = Math.max(1,this.playerHistory.length);
    const kickRatio     = recentKicks/histLen;
    const punchRatio    = recentPunches/histLen;
    const jumpRatio     = recentJumps/histLen;

    // HP-based mode switch
    const myHP   = this.hp/MAX_HP;
    const oppHP  = opp.hp/MAX_HP;
    if(myHP<0.30) this.aiMode='defensive';
    else if(myHP<0.55&&oppHP>0.6) this.aiMode='defensive';
    else if(oppHP<0.35) this.aiMode='aggressive';
    else this.aiMode='neutral';

    // ── incoming projectile: jump over it
    const threat=projs.find(p=>p.owner===0&&
      ((p.vx>0&&p.x<this.x&&this.x-p.x<220)||(p.vx<0&&p.x>this.x&&p.x-this.x<220)));
    if(threat&&this.onGround){ this.jump(); this.aiTimer=18; return; }

    // ── player is in the air: wait for landing, then uppercut
    if(!opp.onGround&&dist<110&&ok){
      this.aiTimer=12; return; // wait
    }
    if(!opp.onGround&&opp.vy>2&&dist<90&&ok){
      this.punch('uppercut'); this.aiTimer=28; return;
    }

    // ── KICK SPAMMER counter: block then punish
    if(kickRatio>0.45&&dist<100){
      if(this.blockCooldown<=0){
        this.blocking=true; this.state='block';
        this.poseTarget=this._getPose('block',0); this.poseLerp=0;
        this.blockCooldown=40;
        this.aiTimer=20;
        // Schedule a punish
        setTimeout(()=>{
          if(this.state!=='dead'&&!this.isAI===false){
            this.blocking=false;
            if(dist<120) this.punch('uppercut');
          }
        }, 320);
        return;
      } else {
        // blockCooldown active: punish window
        if(dist<100&&this.blockCooldown<20){
          this.punch('uppercut'); this.aiTimer=30; return;
        }
      }
    }

    // ── PUNCH SPAMMER: backdash + hadouken
    if(punchRatio>0.50&&dist<90){
      this.vx=this.facing*-SPEED*1.5; // back dash
      this.aiTimer=14;
      if(this.hadoukenCD===0&&dist<220){
        const p=this.hadouken(); if(p)projs.push(p);
        this.aiTimer=55;
      }
      return;
    }

    // ── JUMP SPAMMER: wait and uppercut
    if(jumpRatio>0.40&&dist<110){
      this.aiTimer=8; return; // patience
    }

    // ── HADOUKEN SPAMMER: approach fast and attack
    if(recentHado>=2&&dist>80){
      this.vx=(opp.x>this.x?1:-1)*SPEED*1.4; this.state='walk'; this.aiTimer=10; return;
    }

    // ── Normal decision tree ──────────────────────────────────────────────
    const r=Math.random();

    if(this.aiMode==='defensive'){
      if(dist<90){
        if(r<0.30){this.blocking=true;this.state='block';this.poseTarget=this._getPose('block',0);this.aiTimer=22;}
        else if(r<0.55){this.punch('punch');this.aiTimer=24;}
        else if(r<0.70){this.punch('kick');this.aiTimer=28;}
        else if(r<0.82){this.jump();this.aiTimer=18;}
        else{this.vx=this.facing*-SPEED;this.aiTimer=16;}
      } else if(dist<240){
        if(r<0.35&&this.hadoukenCD===0){const p=this.hadouken();if(p)projs.push(p);this.aiTimer=70;}
        else if(r<0.65){this.vx=(opp.x>this.x?1:-1)*SPEED*.8;this.aiTimer=12;}
        else{this.vx=this.facing*-SPEED;this.aiTimer=14;}
      } else {
        this.vx=(opp.x>this.x?1:-1)*SPEED; this.aiTimer=10;
      }

    } else if(this.aiMode==='aggressive'){
      if(dist<90){
        if(r<0.05){this.blocking=true;this.state='block';this.poseTarget=this._getPose('block',0);this.aiTimer=14;}
        else if(r<0.35){this.punch('punch');this.aiTimer=20;}
        else if(r<0.58){this.punch('kick');this.aiTimer=24;}
        else if(r<0.74){this.punch('uppercut');this.aiTimer=28;}
        else if(r<0.86){this.jump();this.aiTimer=14;}
        else{this.vx=this.facing*-SPEED;this.aiTimer=10;}
      } else {
        this.vx=(opp.x>this.x?1:-1)*SPEED*1.2; this.aiTimer=8;
      }

    } else { // neutral
      if(dist<90){
        if(r<0.10){this.blocking=true;this.state='block';this.poseTarget=this._getPose('block',0);this.aiTimer=18;}
        else if(r<0.35){this.punch('punch');this.aiTimer=22;}
        else if(r<0.54){this.punch('kick');this.aiTimer=26;}
        else if(r<0.68){this.punch('uppercut');this.aiTimer=30;}
        else if(r<0.80){this.jump();this.aiTimer=16;}
        else{this.vx=this.facing*-SPEED*1.1;this.aiTimer=14;}
      } else if(dist<220){
        if(r<0.22&&this.hadoukenCD===0){const p=this.hadouken();if(p)projs.push(p);this.aiTimer=62;}
        else if(r<0.65){this.vx=(opp.x>this.x?1:-1)*SPEED;this.aiTimer=10;}
        else{this.jump();this.aiTimer=18;}
      } else {
        this.vx=(opp.x>this.x?1:-1)*SPEED; this.aiTimer=8;
      }
    }
  }

  recordPlayerMove(type){ // called externally when player lands an attack
    this.playerHistory.push(type);
    if(this.playerHistory.length>10) this.playerHistory.shift();
  }

  _phys(){
    if(!this.onGround) this.vy+=GRAVITY;
    this.x+=this.vx; this.y+=this.vy;
    if(this.y>=GROUND){
      const wasAir=!this.onGround;
      if(wasAir) this.squash=1.35; // squash on landing
      this.y=GROUND; this.vy=0; this.onGround=true;
      if(this.state==='jump') this.state='idle';
    }
    this.vx*=0.80;
  }

  // ── DRAW ─────────────────────────────────────────────────────────────────────
  draw(zs=1,zo=0){
    const bx=this.x+(this.shakeX>0?(Math.random()-.5)*this.shakeX*2:0);
    const by=this.y+zo;
    const f=this.facing;
    const flash=this.hitFlash>0&&this.hitFlash%2===0;
    const sk=this.skin, gic=this.gi, bc=this.belt, hc=this.hair;
    const dead=this.state==='dead';
    const atk=this.state==='attack';
    const at=this.attackType;
    const cr=this.crouching;
    const blk=this.blocking;
    const hurt=this.state==='hurt';
    const T=this.walkT;
    const breath=Math.sin(this.breathT)*2;

    // Get current interpolated pose
    const pt=this.poseTarget;

    ctx.save();
    ctx.translate(bx,by);
    // squash/stretch
    const sqY=this.squash; const sqX=1/sqY;
    ctx.scale(f*zs*sqX,zs*sqY);

    // shadow
    ctx.fillStyle='rgba(0,0,0,.26)';
    ctx.beginPath(); ctx.ellipse(0,0,30,7,0,0,Math.PI*2); ctx.fill();

    const sd=shadeHex;

    // limb helper – capsule with shading
    const limb=(x1,y1,x2,y2,r,col)=>{
      if(!col) col=sk;
      const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
      if(len<1)return;
      ctx.save(); ctx.translate(x1,y1); ctx.rotate(Math.atan2(dy,dx));
      const lg=ctx.createLinearGradient(0,-r,0,r);
      const hi=flash?'#fff':sd(col,28);
      const sh=flash?'#fff':sd(col,-38);
      lg.addColorStop(0,hi); lg.addColorStop(.35,flash?'#fff':col); lg.addColorStop(1,sh);
      ctx.fillStyle=lg;
      ctx.beginPath(); ctx.roundRect(0,-r,len,r*2,r); ctx.fill();
      ctx.restore();
    };
    const jt=(x,y,r,col)=>{
      if(!col)col=sk;
      const jg=ctx.createRadialGradient(x-r*.3,y-r*.3,0,x,y,r);
      jg.addColorStop(0,flash?'#fff':sd(col,30));
      jg.addColorStop(1,flash?'#fff':sd(col,-20));
      ctx.fillStyle=jg; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    };

    // ── LEGS ─────────────────────────────────────────────────────────────────
    const giD=sd(gic,-28);
    const skD=sd(sk,-32);

    if(dead){
      limb(-14,-72,-28,0,10,sk); limb(8,-72,22,0,10,sk);
      limb(-28,-36,-32,0,11,gic); limb(22,-36,26,0,11,gic);
    } else if(at==='kick'&&atk){
      // planted leg
      limb(-10,0,-8,pt.lKneeY,10,sk);
      limb(-8,pt.lKneeY,-6,-72,11,gic);
      // kick leg
      limb(6,-72,pt.kickKneeX||26,pt.kickKneeY||-38,11,gic);
      limb(pt.kickKneeX||26,pt.kickKneeY||-38,pt.kickAnkX||58,pt.kickAnkY||-28,10,sk);
    } else {
      const la=pt.lAnk||(-10), ra=pt.rAnk||10;
      const lkx=pt.lKneeX||(-9), lky=pt.lKneeY||(-42);
      const rkx=pt.rKneeX||9,   rky=pt.rKneeY||(-42);
      limb(la,0,lkx,lky,10,sk); limb(ra,0,rkx,rky,10,sk);
      limb(lkx,lky,-7,-72,11,gic); limb(rkx,rky,7,-72,11,gic);
    }

    // ── FEET (detailed) ───────────────────────────────────────────────────────
    const foot=(fx,fy)=>{
      ctx.save();
      ctx.fillStyle=flash?'#fff':'#1a0a00';
      ctx.beginPath(); ctx.ellipse(fx+7,fy,14,5.5,.05,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=flash?'#fff':'#2e1200';
      ctx.beginPath(); ctx.roundRect(fx-2,fy-6,18,7,2); ctx.fill();
      // sole
      ctx.fillStyle='rgba(255,200,150,.22)';
      ctx.beginPath(); ctx.ellipse(fx+6,fy-1,6,3,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    };
    if(!dead){
      const la=pt.lAnk||(-10), ra=pt.rAnk||10;
      if(at==='kick'&&atk){ foot(pt.kickAnkX||58,pt.kickAnkY||-28); foot(-10,0); }
      else if(!this.onGround){ foot(-14,0); foot(14,0); }
      else{ foot(la,0); foot(ra,0); }
    }

    // ── TORSO ─────────────────────────────────────────────────────────────────
    const hipY=-72, chestY=-112, shlY=-122;
    const hipRot=(pt.hipRot||0);
    // GI body
    ctx.save(); ctx.translate(0,hipY); ctx.rotate(hipRot);
    const tg=ctx.createLinearGradient(-15,-40,15,-40);
    tg.addColorStop(0,flash?'#fff':sd(gic,-20));
    tg.addColorStop(.5,flash?'#fff':gic);
    tg.addColorStop(1,flash?'#fff':sd(gic,-30));
    ctx.fillStyle=tg;
    ctx.beginPath();
    ctx.moveTo(-14,0); ctx.lineTo(14,0); ctx.lineTo(12,-50); ctx.lineTo(-12,-50); ctx.closePath(); ctx.fill();
    // GI fold lines (chest wrinkles)
    if(!flash){
      ctx.strokeStyle='rgba(0,0,0,.14)'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(-4,0); ctx.quadraticCurveTo(-2,-20,0,-26); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(4,0); ctx.quadraticCurveTo(2,-18,0,-24); ctx.stroke();
    }
    // lapel V
    ctx.fillStyle=flash?'#fff':sk;
    ctx.beginPath(); ctx.moveTo(-4,-4); ctx.lineTo(0,-46); ctx.lineTo(4,-4); ctx.closePath(); ctx.fill();
    ctx.fillStyle=flash?'#fff':sd(gic,-15);
    ctx.beginPath(); ctx.moveTo(-4,-4); ctx.lineTo(-6,-22); ctx.lineTo(0,-26); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(4,-4); ctx.lineTo(6,-22); ctx.lineTo(0,-26); ctx.closePath(); ctx.fill();
    ctx.restore();

    // Belt
    ctx.save(); ctx.translate(0,-74);
    ctx.fillStyle=flash?'#fff':bc;
    ctx.beginPath(); ctx.roundRect(-14,-4,28,8,2); ctx.fill();
    ctx.fillStyle=flash?'#fff':sd(bc,18);
    ctx.beginPath(); ctx.ellipse(0,0,5,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=flash?'#fff':bc;
    ctx.beginPath(); ctx.moveTo(-9,4); ctx.lineTo(-3,18); ctx.lineTo(3,18); ctx.lineTo(9,4); ctx.closePath(); ctx.fill();
    ctx.restore();

    // ── ARMS ─────────────────────────────────────────────────────────────────
    const lEx=pt.lElbX||(-18), lEy=pt.lElbY||(-100);
    const lHx=pt.lHx||(-22),   lHy=pt.lHy||(-90);
    const rEx=pt.rElbX||16,    rEy=pt.rElbY||(-96);
    const rHx=pt.rHx||20,      rHy=pt.rHy||(-82);
    const breathOff=breath*0.4;

    // upper arms (gi sleeves)
    limb(-10,shlY,lEx,lEy+breathOff,8,gic);
    limb(10,shlY,rEx,rEy+breathOff,8,gic);
    // forearms (skin)
    limb(lEx,lEy+breathOff,lHx,lHy+breathOff,6.5,sk);
    limb(rEx,rEy+breathOff,rHx,rHy+breathOff,6.5,sk);
    // joints
    jt(-10,shlY,9,gic); jt(10,shlY,9,gic);
    jt(lEx,lEy+breathOff,6,sk); jt(rEx,rEy+breathOff,6,sk);

    // ── HANDS (with fingers) ──────────────────────────────────────────────────
    const hand=(hx,hy,big,open)=>{
      const fr=big?9:7.5;
      const hg=ctx.createRadialGradient(hx,hy-fr*.3,0,hx,hy,fr);
      hg.addColorStop(0,flash?'#fff':sd(sk,22));
      hg.addColorStop(1,flash?'#fff':skD);
      ctx.fillStyle=hg;
      ctx.beginPath(); ctx.arc(hx,hy,fr,0,Math.PI*2); ctx.fill();
      if(!flash){
        // knuckle lines
        ctx.strokeStyle=skD; ctx.lineWidth=1;
        for(let k=0;k<3;k++){
          ctx.beginPath(); ctx.arc(hx,hy+k*1.8-2.5,fr*.52,0.25,Math.PI-.25); ctx.stroke();
        }
        // thumb
        ctx.fillStyle=sd(sk,-10);
        ctx.beginPath(); ctx.ellipse(hx+(big?-fr*.7:fr*.7),hy-fr*.3,fr*.38,fr*.55,big?-.5:.5,0,Math.PI*2); ctx.fill();
        // fingers outline if open/guard
        if(open){
          ctx.strokeStyle=skD; ctx.lineWidth=.8;
          for(let fi=0;fi<4;fi++){
            const fa=(fi/3-.5)*.8;
            ctx.beginPath(); ctx.moveTo(hx+fa*fr,hy-fr*.6);
            ctx.lineTo(hx+fa*fr*.9,hy-fr*1.6); ctx.stroke();
          }
        }
      }
    };
    hand(lHx,lHy+breathOff,false,blk);
    hand(rHx,rHy+breathOff,atk&&at==='punch',atk&&at==='hadouken');

    // ── NECK ─────────────────────────────────────────────────────────────────
    limb(-3,shlY+2,3,shlY-6,5.5,sk);
    // collarbone area (skin)
    ctx.fillStyle=flash?'#fff':sk;
    ctx.beginPath(); ctx.ellipse(0,shlY+2,6,3,0,0,Math.PI); ctx.fill();

    // ── HEAD ─────────────────────────────────────────────────────────────────
    const headX=pt.headX||0;
    const headCY=-136+breath;
    ctx.save(); ctx.translate(headX,0);

    // Skull
    const hg2=ctx.createRadialGradient(-3,headCY-3,0,0,headCY,17);
    hg2.addColorStop(0,flash?'#fff':sd(sk,28));
    hg2.addColorStop(.55,flash?'#fff':sk);
    hg2.addColorStop(1,flash?'#fff':skD);
    ctx.fillStyle=hg2;
    ctx.beginPath(); ctx.ellipse(0,headCY,13.5,16.5,0,0,Math.PI*2); ctx.fill();

    // Jaw
    ctx.fillStyle=flash?'#fff':sk;
    ctx.beginPath(); ctx.ellipse(0,headCY+9.5,10.5,9.5,0,0,Math.PI); ctx.fill();

    // Cheekbones (subtle highlight)
    ctx.fillStyle=flash?'#fff':`rgba(${hexToRgb(sk).join(',')},0.4)`;
    ctx.beginPath(); ctx.ellipse(-8,headCY+2,5,4,-.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(8,headCY+2,5,4,.3,0,Math.PI*2); ctx.fill();

    // Ears
    ctx.fillStyle=flash?'#fff':sk;
    ctx.beginPath(); ctx.ellipse(-14,headCY+2,4.5,6.5,.15,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(14,headCY+2,4.5,6.5,-.15,0,Math.PI*2); ctx.fill();
    // inner ear
    if(!flash){ctx.fillStyle=sd(sk,-18);ctx.beginPath();ctx.ellipse(-14,headCY+2,2.5,4,.15,0,Math.PI*2);ctx.fill();}

    if(dead){
      ctx.strokeStyle='rgba(80,40,10,.9)'; ctx.lineWidth=2.5;
      for(const ex of [-6,4]){
        ctx.beginPath();ctx.moveTo(ex-3,headCY-4);ctx.lineTo(ex+3,headCY+3);ctx.stroke();
        ctx.beginPath();ctx.moveTo(ex+3,headCY-4);ctx.lineTo(ex-3,headCY+3);ctx.stroke();
      }
    } else {
      // Eyebrows
      ctx.strokeStyle=flash?'#fff':hc; ctx.lineWidth=2.2; ctx.lineCap='round';
      const browAngle=hurt?0.12:atk?-.06:0;
      ctx.save(); ctx.translate(-5.5,headCY-8); ctx.rotate(-browAngle-.04);
      ctx.beginPath(); ctx.moveTo(-4.5,0); ctx.quadraticCurveTo(-.5,-2.5,3.5,0); ctx.stroke();
      ctx.restore();
      ctx.save(); ctx.translate(5.5,headCY-8); ctx.rotate(browAngle+.04);
      ctx.beginPath(); ctx.moveTo(-3.5,0); ctx.quadraticCurveTo(.5,-2.5,4.5,0); ctx.stroke();
      ctx.restore();

      // Eye sockets (subtle depth)
      ctx.fillStyle=`rgba(0,0,0,.06)`;
      ctx.beginPath(); ctx.ellipse(-5.5,headCY-1.5,5,4,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(5.5,headCY-1.5,5,4,0,0,Math.PI*2); ctx.fill();

      // Eye whites
      ctx.fillStyle='#f5f0e8';
      ctx.beginPath(); ctx.ellipse(-5.5,headCY-1.5,4.2,3.2,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(5.5,headCY-1.5,4.2,3.2,0,0,Math.PI*2); ctx.fill();

      // Iris
      const irisCol=this.isAI?'#8b2200':'#005577';
      ctx.fillStyle=irisCol;
      ctx.beginPath(); ctx.arc(-5.5,headCY-1.5,2.6,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5.5,headCY-1.5,2.6,0,Math.PI*2); ctx.fill();
      // iris ring
      ctx.strokeStyle=sd(irisCol,-20); ctx.lineWidth=.8;
      ctx.beginPath(); ctx.arc(-5.5,headCY-1.5,2.6,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(5.5,headCY-1.5,2.6,0,Math.PI*2); ctx.stroke();

      // Pupils
      ctx.fillStyle='#0a0502';
      ctx.beginPath(); ctx.arc(-5,headCY-1.5,1.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6,headCY-1.5,1.3,0,Math.PI*2); ctx.fill();
      // Eye shine
      ctx.fillStyle='rgba(255,255,255,.75)';
      ctx.beginPath(); ctx.arc(-4.2,headCY-2.4,.85,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6.8,headCY-2.4,.85,0,Math.PI*2); ctx.fill();

      // Nose (3D with nostril shadow)
      ctx.fillStyle=sd(sk,-12);
      ctx.beginPath();
      ctx.moveTo(1,headCY-2); ctx.quadraticCurveTo(4,headCY+2,3,headCY+5);
      ctx.quadraticCurveTo(1,headCY+6.5,-1,headCY+5);
      ctx.quadraticCurveTo(-2,headCY+2,1,headCY-2); ctx.fill();
      ctx.fillStyle=`rgba(0,0,0,.16)`;
      ctx.beginPath(); ctx.ellipse(-2.5,headCY+5,2,1.5,-.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(3.5,headCY+5,2,1.5,.3,0,Math.PI*2); ctx.fill();

      // Lips
      const lipCol=flash?'#fff':sd(sk,-22);
      ctx.fillStyle=lipCol;
      if(atk){
        // open mouth / shout
        ctx.beginPath(); ctx.ellipse(0,headCY+9.5,4.5,3.5,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#2a0a00';
        ctx.beginPath(); ctx.ellipse(0,headCY+10,3.5,2.5,0,0,Math.PI*2); ctx.fill();
        // teeth
        ctx.fillStyle='#f5f0e8';
        ctx.beginPath(); ctx.roundRect(-3,headCY+8,6,2.5,1); ctx.fill();
      } else if(hurt){
        ctx.beginPath();
        ctx.moveTo(-4,headCY+9); ctx.quadraticCurveTo(0,headCY+7,4,headCY+9); ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(-4,headCY+8.5); ctx.quadraticCurveTo(0,headCY+11,4,headCY+8.5); ctx.fill();
        // upper lip
        ctx.fillStyle=sd(lipCol,-10);
        ctx.beginPath(); ctx.moveTo(-4,headCY+8.5); ctx.quadraticCurveTo(-1,headCY+7,0,headCY+8);
        ctx.quadraticCurveTo(1,headCY+7,4,headCY+8.5); ctx.fill();
      }
    }

    // ── HAIR ─────────────────────────────────────────────────────────────────
    ctx.fillStyle=flash?'#fff':hc;
    ctx.beginPath(); ctx.ellipse(0,headCY-11,14,10,0,Math.PI,Math.PI*2); ctx.fill();
    // sideburns
    ctx.beginPath(); ctx.ellipse(-13,headCY-2,3.5,6,.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(13,headCY-2,3.5,6,-.1,0,Math.PI*2); ctx.fill();
    // hair detail
    if(!flash){
      ctx.strokeStyle=sd(hc,20); ctx.lineWidth=1.5; ctx.lineCap='round';
      for(let hi=-3;hi<=3;hi++){
        ctx.beginPath(); ctx.moveTo(hi*3.5,headCY-16);
        ctx.quadraticCurveTo(hi*4.5,headCY-20,hi*3+.5,headCY-24); ctx.stroke();
      }
    }
    // Headband
    const hbCol=this.isAI?'#cc2000':'#cc7700';
    ctx.fillStyle=flash?'#fff':hbCol;
    ctx.beginPath(); ctx.roundRect(-14.5,headCY-8,29,5.5,2); ctx.fill();
    // headband pattern (zig-zag)
    if(!flash){
      ctx.strokeStyle='rgba(255,255,180,.45)'; ctx.lineWidth=1.2;
      ctx.beginPath();
      for(let hbi=-12;hbi<=12;hbi+=4){
        ctx.lineTo(hbi,headCY-(hbi%8===0?-5:-8));
      }
      ctx.stroke();
    }

    ctx.restore(); // end head translate

    // ── HP bar ────────────────────────────────────────────────────────────────
    const bw=54,bh=5;
    ctx.save(); ctx.scale(1/this.facing,1);
    ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(-bw/2,headCY-38,bw,bh+2);
    const hp=this.hp/MAX_HP;
    const hpc=hp>.5?'#44ff88':hp>.25?'#ffdd00':'#ff2244';
    ctx.fillStyle=hpc; ctx.fillRect(-bw/2,headCY-37,bw*hp,bh);
    ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.lineWidth=1;
    ctx.strokeRect(-bw/2,headCY-38,bw,bh+2);
    ctx.restore();

    ctx.restore(); // end fighter
  }
}

// hex to rgb
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

// ─────────────────────────────────────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────────────────────────────────────
const keys={};
let p1,ai,projs,gs='start';
let roundTime=ROUND_T,roundTimer=60,roundMsgTimer=0,p1W=0,aiW=0,frame=0;
let camX=0;

function initRound(){
  // P1: warm beige skin, white gi, green belt, dark hair
  p1=new Fighter(190,'#e0b882','#f2f0e2','#1a8844','#1a1008',1,false);
  // AI: similar skin, red gi, black belt, dark hair
  ai=new Fighter(630,'#d4a870','#c82200','#111111','#0e0804',-1,true);
  projs=[];roundTime=ROUND_T;roundTimer=60;
  gs='roundStart';showMsg('ROUND '+(p1W+aiW+1),85);
}

const showMsg=(m,d=90)=>{roundMsgTimer=d;const e=document.getElementById('round-msg');e.textContent=m;e.style.opacity='1';};
const hideMsg=()=>{document.getElementById('round-msg').style.opacity='0';};

function checkHits(){
  if(p1.attackBox){
    const r=fRect(ai);
    if(overlap(p1.attackBox,r)){
      ai.takeDamage(p1.attackDmg,p1.facing*2.8);
      ai.recordPlayerMove?null:null; // AI tracks its own
      ai.playerHistory.push(p1.attackType); if(ai.playerHistory.length>10)ai.playerHistory.shift();
      p1.attackBox=null;
      p1._combo();
    }
  }
  if(ai.attackBox){
    if(overlap(ai.attackBox,fRect(p1))){
      p1.takeDamage(ai.attackDmg,ai.facing*2.8);
      ai.attackBox=null;
    }
  }
  for(const pr of projs){
    if(!pr.alive)continue;
    const tgt=pr.owner===0?ai:p1;
    if(Math.abs(pr.x-tgt.x)<30&&Math.abs(pr.y-(tgt.y-66))<33){
      tgt.takeDamage(16,pr.vx*.35); pr.alive=false;
      if(pr.owner===0){ai.playerHistory.push('hadouken');if(ai.playerHistory.length>10)ai.playerHistory.shift();}
    }
  }
}
function fRect(f){return{x:f.x-22,y:f.y-96,w:44,h:96};}
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function updateHUD(){
  document.getElementById('p1-bar').style.width=(p1.hp/MAX_HP*100)+'%';
  document.getElementById('p2-bar').style.width=(ai.hp/MAX_HP*100)+'%';
  document.getElementById('timer').textContent=Math.ceil(roundTime);
}

// debug AI mode
function updateDebug(){
  if(!ai)return;
  const d=document.getElementById('ai-debug');
  const hkR=(ai.playerHistory.filter(m=>m==='kick').length/Math.max(1,ai.playerHistory.length)*100).toFixed(0);
  d.innerHTML=`AI: <b>${ai.aiMode}</b><br>kick%: ${hkR}%<br>block cd: ${ai.blockCooldown}`;
}

function zscale(f){const d=Math.abs(f.x-W/2)/(W/2);return .97-d*.05;}
function zoff(f){const d=Math.abs(f.x-W/2)/(W/2);return d*5;}

function drawStart(){
  ctx.fillStyle='rgba(0,0,0,.68)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ffd700'; ctx.font='bold 52px Georgia, serif';
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=32;
  ctx.fillText('KUNG FU ARENA',W/2,122); ctx.shadowBlur=0;
  ctx.fillStyle='#cc4400'; ctx.font='bold 17px Courier New';
  ctx.fillText('☯  CHEN  vs  HONG  ☯',W/2,160);
  ctx.fillStyle='#ccc'; ctx.font='14px Courier New';
  ctx.fillText('A/D bouger  ·  W sauter  ·  S garde',W/2,216);
  ctx.fillText('U poing  ·  I pied  ·  O uppercut  ·  J ki blast',W/2,240);
  ctx.fillStyle='#aaa'; ctx.font='12px Courier New';
  ctx.fillText("L'IA analyse tes combos et contre tes spams",W/2,270);
  ctx.fillStyle='#ffd700'; ctx.globalAlpha=.6+Math.sin(Date.now()*.004)*.4;
  ctx.font='bold 20px Courier New';
  ctx.fillText('[ ENTRÉE POUR COMMENCER ]',W/2,318);
  ctx.globalAlpha=1; ctx.textAlign='left';
}

function drawOver(){
  ctx.fillStyle='rgba(0,0,0,.75)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const wn=p1W>aiW?'CHEN':'HONG';
  ctx.fillStyle=p1W>aiW?'#44ff88':'#ff7722';
  ctx.font='bold 52px Georgia, serif';
  ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=32;
  ctx.fillText(wn+' GAGNE !',W/2,158); ctx.shadowBlur=0;
  ctx.fillStyle='#bbb'; ctx.font='16px Courier New';
  ctx.fillText('Score  Chen '+p1W+'  —  Hong '+aiW,W/2,205);
  ctx.fillStyle='#ffd700'; ctx.globalAlpha=.6+Math.sin(Date.now()*.004)*.4;
  ctx.font='bold 18px Courier New';
  ctx.fillText('[ ENTRÉE pour rejouer ]',W/2,275);
  ctx.globalAlpha=1; ctx.textAlign='left';
}

let lastTime=0;
function loop(ts){
  frame++;
  const dt=Math.min((ts-lastTime)/16.67,3); lastTime=ts;
  if(p1&&ai){const mid=(p1.x+ai.x)/2;camX+=(mid-W/2-camX)*.04;}
  drawBG();
  if(gs==='start'){drawStart();requestAnimationFrame(loop);return;}
  if(gs==='roundStart'){
    p1.draw(zscale(p1),zoff(p1)); ai.draw(zscale(ai),zoff(ai));
    if(--roundMsgTimer<=0){hideMsg();showMsg('FIGHT!',48);gs='fight';}
    updateHUD(); requestAnimationFrame(loop); return;
  }
  if(gs==='fight'){
    if(--roundTimer<=0){roundTime-=1/60;roundTimer=60;}
    p1.update(keys,ai,projs,frame); ai.update(keys,p1,projs,frame);
    for(const pr of projs)pr.update();
    projs=projs.filter(p=>p.alive);
    checkHits(); updateHUD(); updateDebug();
    const[front,back]=p1.x<ai.x?[ai,p1]:[p1,ai];
    back.draw(zscale(back),zoff(back));
    for(const pr of projs)pr.draw();
    front.draw(zscale(front),zoff(front));
    const cd=document.getElementById('combo-display');
    if(p1.comboCount>=2&&p1.comboTimer>0){cd.textContent=p1.comboCount+' HIT COMBO!';cd.style.opacity='1';}
    else cd.style.opacity='0';
    if(p1.hp<=0||ai.hp<=0||roundTime<=0){
      let msg;
      if(roundTime<=0){if(p1.hp>ai.hp){p1W++;msg='CHEN WINS!';}else if(ai.hp>p1.hp){aiW++;msg='HONG WINS!';}else msg='DRAW!';}
      else if(p1.hp<=0){aiW++;msg='HONG WINS!';}
      else{p1W++;msg='CHEN WINS!';}
      showMsg(msg,130); gs='roundEnd';
    }
    if(--roundMsgTimer<=0)hideMsg();
  }
  if(gs==='roundEnd'){
    p1.update(keys,ai,projs,frame); ai.update(keys,p1,projs,frame);
    const[front,back]=p1.x<ai.x?[ai,p1]:[p1,ai];
    back.draw(zscale(back),zoff(back));
    for(const pr of projs)pr.draw();
    front.draw(zscale(front),zoff(front));
    updateHUD(); if(--roundMsgTimer<=0){hideMsg();if(p1W>=2||aiW>=2)gs='gameover';else initRound();}
  }
  if(gs==='gameover'){
    const[front,back]=p1.x<ai.x?[ai,p1]:[p1,ai];
    back.draw(zscale(back),zoff(back)); front.draw(zscale(front),zoff(front));
    drawOver();
  }
  requestAnimationFrame(loop);
}

window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Enter'){if(gs==='start'||gs==='gameover'){p1W=0;aiW=0;initRound();}}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

initRound(); gs='start'; requestAnimationFrame(loop);
</script>

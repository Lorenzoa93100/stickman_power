<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kung Fu Arena</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#1a0a00;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Courier New',monospace;
    color:#fff; overflow:hidden;
  }
  h1 { font-size:1.6rem; color:#c8860a; text-shadow:0 0 16px #c8860a88; margin-bottom:5px; letter-spacing:5px; }
  #game-wrapper { position:relative; border:3px solid #8b4a00; box-shadow:0 0 40px #8b4a0055; }
  canvas { display:block; }
  #hud { display:flex; justify-content:space-between; align-items:center; width:820px; padding:5px 0; gap:8px; }
  .health-bar-wrap { flex:1; background:#1a0a00; height:20px; border:1px solid #8b4a00; position:relative; overflow:hidden; }
  .health-bar { height:100%; transition:width 0.08s; }
  #p1-bar { background:linear-gradient(90deg,#00cc66,#66ff99); }
  #p2-bar { background:linear-gradient(90deg,#ff4400,#ffaa00); float:right; }
  .name-tag { font-size:0.7rem; font-weight:bold; letter-spacing:2px; padding:0 5px; white-space:nowrap; }
  #timer { font-size:1.3rem; font-weight:bold; color:#ffd700; min-width:38px; text-align:center; text-shadow:0 0 8px #ffd700; }
  #round-msg {
    position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
    font-size:2.8rem; font-weight:bold; color:#ffd700;
    text-shadow:0 0 20px #ffd700, 0 2px 0 #8b4a00;
    pointer-events:none; letter-spacing:6px; z-index:10;
    opacity:0; transition:opacity 0.25s; font-family:'Courier New',monospace;
  }
  #controls { margin-top:7px; display:flex; gap:20px; font-size:0.65rem; color:#998; max-width:820px; }
  .key { background:#2a1500; border:1px solid #8b4a00; padding:1px 5px; border-radius:3px; color:#ffcc66; font-size:0.6rem; display:inline-block; }
  #combo-display { position:absolute; bottom:8px; left:10px; font-size:0.9rem; color:#ffd700; pointer-events:none; font-weight:bold; text-shadow:0 0 8px #ffd700; }
</style>
</head>
<body>
<h1>&#x2604; KUNG FU ARENA &#x2604;</h1>
<div id="hud">
  <span class="name-tag" style="color:#66ff99">&#x1F409; CHEN</span>
  <div class="health-bar-wrap"><div class="health-bar" id="p1-bar" style="width:100%"></div></div>
  <div id="timer">60</div>
  <div class="health-bar-wrap"><div class="health-bar" id="p2-bar" style="width:100%;float:right"></div></div>
  <span class="name-tag" style="color:#ffaa00">HONG &#x1F525;</span>
</div>
<div id="game-wrapper">
  <canvas id="c" width="820" height="430"></canvas>
  <div id="round-msg">FIGHT!</div>
  <div id="combo-display"></div>
</div>
<div id="controls">
  <span><span class="key">A</span><span class="key">D</span> bouger &nbsp;<span class="key">W</span> sauter &nbsp;<span class="key">S</span> garde</span>
  <span><span class="key">U</span> poing &nbsp;<span class="key">I</span> coup de pied &nbsp;<span class="key">O</span> uppercut &nbsp;<span class="key">J</span> ki blast</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 68;
const GRAVITY = 0.58, JUMP = -15.5, SPEED = 3.6, MAX_HP = 100, ROUND_TIME = 60;

// ── BACKGROUND ───────────────────────────────────────────────────────────────
let cloudT = 0;
const clouds = [];
for (let i = 0; i < 7; i++)
  clouds.push({ x: Math.random()*W, y: 30+Math.random()*80, w: 60+Math.random()*80, speed: 0.12+Math.random()*0.18 });

function drawBG() {
  // Sky gradient – clear blue
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
  sky.addColorStop(0, '#4aa8e8');
  sky.addColorStop(0.55, '#87ceeb');
  sky.addColorStop(1, '#c8e8f5');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, GROUND);

  // Far hills (muted green)
  ctx.fillStyle = '#6fa86a';
  ctx.beginPath(); ctx.moveTo(0, GROUND);
  for (let x = 0; x <= W; x += 5) {
    const y = GROUND - 90 - Math.sin(x*0.012)*45 - Math.sin(x*0.022+1)*25 - Math.sin(x*0.007+2)*30;
    x===0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.lineTo(W, GROUND); ctx.closePath(); ctx.fill();

  // Mid hills
  ctx.fillStyle = '#88c47a';
  ctx.beginPath();
  for (let x = 0; x <= W; x += 5) {
    const y = GROUND - 55 - Math.sin(x*0.018+0.5)*35 - Math.sin(x*0.03+2)*18;
    x===0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.lineTo(W, GROUND); ctx.closePath(); ctx.fill();

  // Hill highlights
  ctx.fillStyle = 'rgba(180,230,150,0.35)';
  ctx.beginPath();
  for (let x = 0; x <= W; x += 5) {
    const y = GROUND - 55 - Math.sin(x*0.018+0.5)*35 - Math.sin(x*0.03+2)*18 - 4;
    x===0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  for (let x = W; x >= 0; x -= 5) {
    const y = GROUND - 55 - Math.sin(x*0.018+0.5)*35 - Math.sin(x*0.03+2)*18 + 6;
    ctx.lineTo(x, y);
  }
  ctx.closePath(); ctx.fill();

  // Clouds
  cloudT += 0.008;
  for (const c of clouds) {
    c.x += c.speed;
    if (c.x > W + 100) c.x = -120;
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    const cx = c.x, cy = c.y, cw = c.w;
    ctx.beginPath(); ctx.ellipse(cx, cy, cw*0.5, 18, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-cw*0.22, cy+4, cw*0.3, 14, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+cw*0.22, cy+2, cw*0.32, 16, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Pagoda silhouette (left bg)
  drawPagoda(90, GROUND - 30, 0.65);
  // Pagoda silhouette (right bg)
  drawPagoda(680, GROUND - 30, 0.5);

  // Cherry blossom trees
  drawTree(170, GROUND, 0.75);
  drawTree(620, GROUND, 0.8);

  // ── Arena floor ──────────────────────────────────────────────────────────
  // Stone floor
  const floor = ctx.createLinearGradient(0, GROUND, 0, H);
  floor.addColorStop(0, '#c4976a');
  floor.addColorStop(0.4, '#a87848');
  floor.addColorStop(1, '#6b4a28');
  ctx.fillStyle = floor;
  ctx.fillRect(0, GROUND, W, H - GROUND);

  // Stone tiles
  ctx.save();
  const vp = W/2;
  for (let col = -6; col <= 6; col++) {
    const lineX1 = vp + col * 55;
    const lineX2 = vp + col * 600;
    ctx.strokeStyle = 'rgba(80,40,10,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(lineX1, GROUND); ctx.lineTo(lineX2, H+200); ctx.stroke();
  }
  for (let row = 0; row < 5; row++) {
    const y = GROUND + 14 + row * 28;
    ctx.strokeStyle = 'rgba(80,40,10,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();

  // Floor highlight near ground line
  ctx.fillStyle = 'rgba(255,220,150,0.18)';
  ctx.fillRect(0, GROUND, W, 8);

  // Ground line with red accent
  ctx.strokeStyle = '#cc3300';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#cc3300'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();
  ctx.shadowBlur = 0;

  // Arena border pillars
  drawPillar(20, GROUND - 80);
  drawPillar(W - 20, GROUND - 80);

  // Decorative banner (center top)
  drawBanner();
}

function drawPagoda(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(60,30,10,0.55)';
  // levels
  for (let i = 0; i < 4; i++) {
    const ly = -i*32, lw = 50-i*8;
    ctx.fillRect(-lw/2, ly-28, lw, 28);
    // roof
    ctx.beginPath();
    ctx.moveTo(-lw/2-10, ly);
    ctx.lineTo(0, ly-10);
    ctx.lineTo(lw/2+10, ly);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawTree(x, y, scale) {
  ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
  // trunk
  ctx.fillStyle = '#5a3010';
  ctx.fillRect(-5, -60, 10, 60);
  ctx.fillRect(-3, -100, 7, 45);
  // blossom
  const petals = ['rgba(255,182,193,0.8)','rgba(255,160,180,0.7)','rgba(255,200,210,0.75)'];
  for (let i = 0; i < 18; i++) {
    const a = (i/18)*Math.PI*2;
    const r = 28+Math.sin(i*2.3)*8;
    const px = Math.cos(a)*r, py = -100 + Math.sin(a)*r*0.7;
    ctx.fillStyle = petals[i%3];
    ctx.beginPath(); ctx.arc(px, py, 12+Math.sin(i)*3, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = 'rgba(255,150,170,0.6)';
  ctx.beginPath(); ctx.arc(0, -100, 22, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPillar(x, y) {
  ctx.save(); ctx.translate(x, y);
  // column
  const cg = ctx.createLinearGradient(-8,0,8,0);
  cg.addColorStop(0,'#8b4a00'); cg.addColorStop(0.4,'#d4822a'); cg.addColorStop(1,'#8b4a00');
  ctx.fillStyle = cg;
  ctx.fillRect(-7, 0, 14, 80);
  // capital
  ctx.fillStyle = '#c8640a';
  ctx.fillRect(-12, -8, 24, 10);
  ctx.fillRect(-9, 0, 18, 6);
  ctx.restore();
}

function drawBanner() {
  ctx.save();
  ctx.translate(W/2, 10);
  // rope
  ctx.strokeStyle = '#8b4a00'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-120,0); ctx.lineTo(120,0); ctx.stroke();
  // lanterns
  for (const lx of [-80,-30,30,80]) {
    ctx.fillStyle = lx<0 ? '#cc2200' : '#ffaa00';
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.ellipse(lx, 16, 7, 10, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillStyle='rgba(255,255,200,0.6)';
    ctx.beginPath(); ctx.ellipse(lx-2,14,2,3,0,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ── PROJECTILE ───────────────────────────────────────────────────────────────
class Projectile {
  constructor(x, y, dir, owner) {
    this.x=x; this.y=y; this.vx=dir*7.5; this.owner=owner; this.alive=true; this.t=0;
  }
  update() { this.x+=this.vx; this.t+=0.22; if(this.x<-30||this.x>W+30)this.alive=false; }
  draw() {
    ctx.save(); ctx.translate(this.x, this.y);
    const c = this.owner===0?'#44ffaa':'#ff8822';
    ctx.shadowColor=c; ctx.shadowBlur=22;
    // outer ring
    ctx.strokeStyle=c; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.stroke();
    // inner glow
    const g=ctx.createRadialGradient(0,0,0,0,0,11);
    g.addColorStop(0,'rgba(255,255,255,0.9)');
    g.addColorStop(0.4,c); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
    // rotating spokes
    ctx.rotate(this.t*2);
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5;
    for(let i=0;i<4;i++){
      ctx.save(); ctx.rotate(i*Math.PI/2);
      ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(0,-13); ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }
}

// ── FIGHTER ───────────────────────────────────────────────────────────────────
class Fighter {
  constructor(x, skinColor, giColor, beltColor, facing, isAI) {
    this.x=x; this.y=GROUND;
    this.vx=0; this.vy=0;
    this.skin=skinColor; this.gi=giColor; this.belt=beltColor;
    this.facing=facing; this.isAI=isAI;
    this.hp=MAX_HP;
    this.state='idle'; this.stateTimer=0;
    this.attackBox=null; this.attackDmg=0; this.attackType='punch';
    this.onGround=true;
    this.comboCount=0; this.comboTimer=0;
    this.hadoukenCooldown=0;
    this.aiTimer=0;
    this.blocking=false; this.crouching=false;
    this.walkT=0; this.hitFlash=0; this.shakeX=0;
  }

  punch(type='punch') {
    if(['attack','hurt','dead'].includes(this.state)) return false;
    this.state='attack'; this.attackType=type;
    this.stateTimer=type==='uppercut'?30:type==='kick'?28:20;
    this.attackDmg=type==='uppercut'?13:type==='kick'?11:8;
    this.attackBox={x:this.x+this.facing*40,y:this.y-(type==='kick'?30:type==='uppercut'?70:55),w:46,h:36};
    return true;
  }
  hadouken() {
    if(this.hadoukenCooldown>0||['hurt','dead'].includes(this.state)) return null;
    this.hadoukenCooldown=95; this.state='attack'; this.stateTimer=22;
    this.attackType='hadouken'; this.attackBox=null; this.attackDmg=0;
    return new Projectile(this.x+this.facing*26,this.y-62,this.facing,this.isAI?1:0);
  }
  jump() { if(!this.onGround)return; this.vy=JUMP; this.onGround=false; this.state='jump'; }
  takeDamage(dmg,kb=0) {
    if(this.state==='dead')return;
    if(this.blocking)dmg=Math.max(1,Math.floor(dmg*0.12));
    this.hp=Math.max(0,this.hp-dmg);
    this.hitFlash=10; this.shakeX=7;
    if(this.hp<=0){this.state='dead';this.stateTimer=9999;return;}
    this.vx+=kb; this.state='hurt'; this.stateTimer=20; this.attackBox=null;
  }

  update(keys,opp,projs) {
    if(this.stateTimer>0)this.stateTimer--;
    if(this.hadoukenCooldown>0)this.hadoukenCooldown--;
    if(this.comboTimer>0)this.comboTimer--; else this.comboCount=0;
    if(this.hitFlash>0)this.hitFlash--;
    if(this.shakeX>0)this.shakeX-=1.8;
    if(this.state==='dead'){this._phys();return;}
    if(this.state==='hurt'&&this.stateTimer<=0)this.state='idle';
    if(this.state==='attack'&&this.stateTimer<=0){this.state='idle';this.attackBox=null;}
    if(this.isAI)this._ai(opp,projs); else this._player(keys,opp,projs);
    this._phys();
    this.x=Math.max(45,Math.min(W-45,this.x));
    if(Math.abs(this.vx)>0.1)this.walkT+=0.2;
    if(this.state!=='attack')this.facing=opp.x>this.x?1:-1;
  }

  _player(keys,opp,projs) {
    this.blocking=false; this.crouching=false;
    if(keys['s']||keys['ArrowDown']){this.crouching=true;this.blocking=true;this.state='crouch';this.vx*=0.7;return;}
    const ok=!['attack','hurt'].includes(this.state);
    if(ok){
      this.vx=0;
      if(keys['a']||keys['ArrowLeft']){this.vx=-SPEED;this.state='walk';}
      if(keys['d']||keys['ArrowRight']){this.vx=SPEED;this.state='walk';}
      if((keys['w']||keys['ArrowUp'])&&this.onGround)this.jump();
      if(this.vx===0&&this.state==='walk')this.state='idle';
      if(keys['u']){if(this.punch('punch')){this._combo();keys['u']=false;}}
      if(keys['i']){if(this.punch('kick')){this._combo();keys['i']=false;}}
      if(keys['o']){if(this.punch('uppercut')){this._combo();keys['o']=false;}}
      if(keys['j']){const p=this.hadouken();if(p)projs.push(p);keys['j']=false;}
    }
  }
  _combo(){this.comboCount++;this.comboTimer=65;}
  _ai(opp,projs){
    this.aiTimer--;
    if(this.aiTimer>0)return;
    const dist=Math.abs(opp.x-this.x);
    const ok=!['attack','hurt'].includes(this.state);
    if(!ok){this.aiTimer=6;return;}
    this.blocking=false;this.vx=0;
    const r=Math.random();
    const threat=projs.find(p=>p.owner===0&&Math.abs(p.x-this.x)<200&&((p.vx>0&&p.x<this.x)||(p.vx<0&&p.x>this.x)));
    if(threat){this.jump();this.aiTimer=22;return;}
    if(dist<90){
      if(r<0.08){this.blocking=true;this.state='block';this.aiTimer=18;}
      else if(r<0.35){this.punch('punch');this.aiTimer=24;}
      else if(r<0.55){this.punch('kick');this.aiTimer=30;}
      else if(r<0.70){this.punch('uppercut');this.aiTimer=34;}
      else if(r<0.84){this.jump();this.aiTimer=16;}
      else{this.vx=this.facing*-SPEED;this.aiTimer=14;}
    } else if(dist<230){
      if(r<0.22&&this.hadoukenCooldown===0){const p=this.hadouken();if(p)projs.push(p);this.aiTimer=65;}
      else if(r<0.72){this.vx=(opp.x>this.x?1:-1)*SPEED;this.aiTimer=10;}
      else{this.jump();this.aiTimer=20;}
    } else{this.vx=(opp.x>this.x?1:-1)*SPEED;this.aiTimer=8;}
  }
  _phys(){
    if(!this.onGround)this.vy+=GRAVITY;
    this.x+=this.vx;this.y+=this.vy;
    if(this.y>=GROUND){this.y=GROUND;this.vy=0;this.onGround=true;if(this.state==='jump')this.state='idle';}
    this.vx*=0.80;
  }

  // ── DRAW ─────────────────────────────────────────────────────────────────
  draw(zs=1, zo=0) {
    const bx = this.x + (this.shakeX>0?(Math.random()-0.5)*this.shakeX*2:0);
    const by = this.y + zo;
    const f = this.facing;
    const cr = this.crouching;
    const dead = this.state==='dead';
    const atk = this.state==='attack';
    const at = this.attackType;
    const hurt = this.state==='hurt';
    const blk = this.blocking;
    const T = this.walkT;
    const flash = this.hitFlash>0&&this.hitFlash%2===0;
    const sc = this.skin;
    const gc = this.gi;
    const bc = this.belt;

    ctx.save();
    ctx.translate(bx, by);
    ctx.scale(f*zs, zs);

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.28)';
    ctx.beginPath();ctx.ellipse(0,0,28,7,0,0,Math.PI*2);ctx.fill();

    // ── Proportions (y=0 is feet) ────────────────────────────────────────
    const CY = cr ? 0.58 : 1;
    const ankY=0, kneeY=-44*CY, hipY=-72*CY, waistY=-78*CY;
    const chestY=-108*CY, shlY=-118*CY, neckY=-122*CY, headCY=-138*CY;

    // helper: draw a thick limb (capsule)
    const limb=(x1,y1,x2,y2,r,col,shad)=>{
      const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
      if(len<1)return;
      ctx.save();ctx.translate(x1,y1);ctx.rotate(Math.atan2(dy,dx));
      const lg=ctx.createLinearGradient(0,-r,0,r);
      lg.addColorStop(0,shad||col);lg.addColorStop(0.35,col);lg.addColorStop(1,'rgba(0,0,0,0.45)');
      ctx.fillStyle=flash?'#fff':lg;
      ctx.beginPath();ctx.roundRect(0,-r,len,r*2,r*0.9);ctx.fill();
      ctx.restore();
    };
    const jt=(x,y,r,col)=>{ctx.fillStyle=flash?'#fff':col;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();};

    // ── LEGS ─────────────────────────────────────────────────────────────
    const skinDark = shadeColor(sc, -30);
    if(dead){
      limb(-14,hipY,-30,ankY-5,9,sc,skinDark);
      limb(8,hipY,22,ankY-5,9,sc,skinDark);
    } else if(cr){
      // crouch – wide stance
      limb(-22,ankY,-12,kneeY+8,9,sc,skinDark);
      limb(22,ankY,12,kneeY+8,9,sc,skinDark);
      limb(-12,kneeY+8,-6,hipY,10,gc,shadeColor(gc,-25));
      limb(12,kneeY+8,6,hipY,10,gc,shadeColor(gc,-25));
    } else if(!this.onGround){
      // tucked jump
      limb(-18,ankY-12,-10,kneeY+14,9,sc,skinDark);
      limb(18,ankY-12,10,kneeY+14,9,sc,skinDark);
      limb(-10,kneeY+14,-6,hipY+8,10,gc,shadeColor(gc,-25));
      limb(10,kneeY+14,6,hipY+8,10,gc,shadeColor(gc,-25));
    } else if(atk&&at==='kick'){
      // front kick: left leg planted, right extends
      limb(-10,ankY,-6,kneeY,9,sc,skinDark);
      limb(-6,kneeY,-5,hipY,10,gc,shadeColor(gc,-25));
      limb(6,hipY,26,kneeY+12,10,gc,shadeColor(gc,-25));
      limb(26,kneeY+12,56,kneeY+20,9,sc,skinDark);
    } else if(this.state==='walk'){
      const sw=Math.sin(T);
      const lkx=-8+sw*8,lky=kneeY+sw*10,lax=-6+sw*16;
      const rkx=8-sw*8,rky=kneeY-sw*10,rax=6-sw*16;
      limb(lax,ankY,lkx,lky,9,sc,skinDark);
      limb(rax,ankY,rkx,rky,9,sc,skinDark);
      limb(lkx,lky,-7,hipY,10,gc,shadeColor(gc,-25));
      limb(rkx,rky,7,hipY,10,gc,shadeColor(gc,-25));
    } else {
      // idle stance – slight open stance
      limb(-10,ankY,-7,kneeY,9,sc,skinDark);
      limb(10,ankY,7,kneeY,9,sc,skinDark);
      limb(-7,kneeY,-5,hipY,10,gc,shadeColor(gc,-25));
      limb(7,kneeY,5,hipY,10,gc,shadeColor(gc,-25));
    }

    // Feet / shoes
    const foot=(fx,fy)=>{
      ctx.fillStyle=flash?'#fff':'#2a1000';
      ctx.beginPath();ctx.ellipse(fx+5,fy,13,5,0.05,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,200,150,0.3)';
      ctx.beginPath();ctx.ellipse(fx+4,fy-1,5,3,0,0,Math.PI*2);ctx.fill();
    };
    if(!dead){
      if(atk&&at==='kick'){foot(56,kneeY+20);foot(-10,ankY);}
      else if(cr){foot(-22,ankY);foot(22,ankY);}
      else if(!this.onGround){foot(-18,ankY-12);foot(18,ankY-12);}
      else{foot(-10,ankY);foot(10,ankY);}
    }

    // ── GI TORSO ──────────────────────────────────────────────────────────
    const giDark=shadeColor(gc,-28);
    const gLap=(x,y)=>{ // gi lapels
      ctx.save(); ctx.translate(x,y);
      ctx.fillStyle=shadeColor(gc,15);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-4,-30);ctx.lineTo(4,-30);ctx.closePath();ctx.fill();
      ctx.restore();
    };
    // main torso
    ctx.fillStyle=flash?'#fff':gc;
    ctx.beginPath();
    ctx.moveTo(-14,hipY);ctx.lineTo(14,hipY);
    ctx.lineTo(12,shlY);ctx.lineTo(-12,shlY);ctx.closePath();ctx.fill();
    // lapel V
    ctx.fillStyle=shadeColor(gc,-20);
    ctx.beginPath();ctx.moveTo(-4,shlY+6);ctx.lineTo(0,hipY-4);ctx.lineTo(4,shlY+6);ctx.closePath();ctx.fill();
    ctx.fillStyle=sc; // skin showing at collar
    ctx.beginPath();ctx.moveTo(-3,shlY+8);ctx.lineTo(0,chestY+6);ctx.lineTo(3,shlY+8);ctx.closePath();ctx.fill();
    // gi shading
    ctx.fillStyle='rgba(0,0,0,0.12)';
    ctx.beginPath();ctx.moveTo(0,hipY);ctx.lineTo(-14,hipY);ctx.lineTo(-12,shlY);ctx.lineTo(0,shlY+2);ctx.closePath();ctx.fill();

    // Belt
    ctx.fillStyle=flash?'#fff':bc;
    ctx.beginPath();ctx.roundRect(-14,waistY-5,28,9,2);ctx.fill();
    ctx.fillStyle=shadeColor(bc,20);
    // knot
    ctx.beginPath();ctx.ellipse(0,waistY,5,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=bc;
    ctx.beginPath();ctx.moveTo(-10,waistY+4);ctx.lineTo(-4,waistY+16);ctx.lineTo(4,waistY+16);ctx.lineTo(10,waistY+4);ctx.closePath();ctx.fill();

    // ── ARMS ──────────────────────────────────────────────────────────────
    let lEx,lEy,lHx,lHy,rEx,rEy,rHx,rHy;
    const gS=shadeColor(gc,-25);

    if(dead){
      lEx=-26;lEy=shlY+22;lHx=-38;lHy=shlY+42;
      rEx=26;rEy=shlY+22;rHx=38;rHy=shlY+42;
    } else if(blk){
      // Guard – arms up, crossed in front
      lEx=16;lEy=shlY+16;lHx=20;lHy=shlY-2;
      rEx=20;rEy=shlY+20;rHx=24;rHy=shlY+2;
    } else if(atk&&at==='punch'){
      // Right jab
      lEx=-18;lEy=shlY+20;lHx=-22;lHy=shlY+14;
      rEx=24;rEy=shlY+12;rHx=52;rHy=shlY+10;
    } else if(atk&&at==='uppercut'){
      // Dragon uppercut
      lEx=-15;lEy=shlY+18;lHx=-18;lHy=shlY+10;
      rEx=12;rEy=shlY+8;rHx=16;rHy=shlY-22;
    } else if(atk&&at==='kick'){
      // arms for balance
      lEx=-24;lEy=shlY+14;lHx=-36;lHy=shlY+6;
      rEx=20;rEy=shlY+16;rHx=30;rHy=shlY+6;
    } else if(atk&&at==='hadouken'){
      // Both forward
      lEx=16;lEy=shlY+16;lHx=40;lHy=shlY+14;
      rEx=18;rEy=shlY+20;rHx=42;rHy=shlY+18;
    } else if(hurt){
      lEx=-22;lEy=shlY+10;lHx=-34;lHy=shlY+2;
      rEx=22;rEy=shlY+10;rHx=34;rHy=shlY+2;
    } else if(this.state==='walk'){
      const sw=Math.sin(T+Math.PI);
      lEx=-16+sw*4;lEy=shlY+18;lHx=-20+sw*10;lHy=shlY+34+sw*5;
      rEx=16-sw*4;rEy=shlY+18;rHx=20-sw*10;rHy=shlY+34-sw*5;
    } else {
      // Guard idle (kung-fu ready stance)
      lEx=14;lEy=shlY+20;lHx=20;lHy=shlY+8;
      rEx=-12;rEy=shlY+20;rHx=-14;rHy=shlY+36;
    }

    // upper arms (gi sleeves)
    limb(-10,shlY,lEx,lEy,7.5,gc,gS);
    limb(10,shlY,rEx,rEy,7.5,gc,gS);
    // forearms (skin)
    limb(lEx,lEy,lHx,lHy,6,sc,skinDark);
    limb(rEx,rEy,rHx,rHy,6,sc,skinDark);
    // shoulder joints
    jt(-10,shlY,8,gc);jt(10,shlY,8,gc);
    // elbow joints
    jt(lEx,lEy,5.5,sc);jt(rEx,rEy,5.5,sc);

    // Fists
    const fist=(hx,hy,big)=>{
      const fr=big?9:7;
      const fg=ctx.createRadialGradient(hx,hy-fr*0.3,0,hx,hy,fr);
      fg.addColorStop(0,shadeColor(sc,20));fg.addColorStop(1,skinDark);
      ctx.fillStyle=flash?'#fff':fg;
      ctx.beginPath();ctx.arc(hx,hy,fr,0,Math.PI*2);ctx.fill();
      // knuckle lines
      if(!flash){
        ctx.strokeStyle=skinDark;ctx.lineWidth=1;
        for(let k=0;k<3;k++){
          ctx.beginPath();ctx.arc(hx,hy+k*1.5-2,fr*0.55,0.2,Math.PI-0.2);ctx.stroke();
        }
      }
    };
    fist(lHx,lHy,false);
    fist(rHx,rHy,atk&&at==='punch');

    // ── NECK ──────────────────────────────────────────────────────────────
    limb(-3,shlY+2,3,neckY+2,5.5,sc,skinDark);

    // ── HEAD ──────────────────────────────────────────────────────────────
    const hY=headCY;
    // Head shape (slightly oval, realistic)
    const hg=ctx.createRadialGradient(-2,hY-4,0,0,hY,16);
    hg.addColorStop(0,shadeColor(sc,25));
    hg.addColorStop(0.55,sc);
    hg.addColorStop(1,skinDark);
    ctx.fillStyle=flash?'#fff':hg;
    ctx.beginPath();ctx.ellipse(0,hY,13,16,0,0,Math.PI*2);ctx.fill();

    // Jaw
    ctx.fillStyle=flash?'#fff':sc;
    ctx.beginPath();ctx.ellipse(0,hY+9,10,9,0,0,Math.PI);ctx.fill();

    // Ear
    ctx.fillStyle=flash?'#fff':sc;
    ctx.beginPath();ctx.ellipse(-13,hY+2,4,6,0.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(13,hY+2,4,6,-0.2,0,Math.PI*2);ctx.fill();

    if(dead){
      // X eyes
      ctx.strokeStyle='#333';ctx.lineWidth=2.2;
      for(const ex of [-5,4]){
        ctx.beginPath();ctx.moveTo(ex-2.5,hY-4);ctx.lineTo(ex+2.5,hY+2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(ex+2.5,hY-4);ctx.lineTo(ex-2.5,hY+2);ctx.stroke();
      }
    } else {
      // Brow (subtle)
      ctx.strokeStyle=shadeColor(sc,-50);ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(-8,hY-7);ctx.lineTo(-3,hY-8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(3,hY-8);ctx.lineTo(8,hY-7);ctx.stroke();
      if(hurt){ctx.beginPath();ctx.moveTo(-8,hY-7);ctx.lineTo(-3,hY-6);ctx.stroke();ctx.beginPath();ctx.moveTo(3,hY-6);ctx.lineTo(8,hY-7);ctx.stroke();}

      // Eye whites
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.ellipse(-5,hY-2,3.8,3,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(5,hY-2,3.8,3,0,0,Math.PI*2);ctx.fill();
      // Iris
      ctx.fillStyle=this.isAI?'#cc4400':'#006699';
      ctx.beginPath();ctx.arc(-5,hY-2,2.4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(5,hY-2,2.4,0,Math.PI*2);ctx.fill();
      // Pupil
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(-4.5,hY-2,1.1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(5.5,hY-2,1.1,0,Math.PI*2);ctx.fill();
      // Eye shine
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.beginPath();ctx.arc(-4,hY-3,0.7,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(6,hY-3,0.7,0,Math.PI*2);ctx.fill();

      // Nose
      ctx.strokeStyle=skinDark;ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(1,hY-1);ctx.lineTo(2,hY+4);ctx.lineTo(-1,hY+4);ctx.stroke();

      // Mouth
      ctx.strokeStyle=shadeColor(sc,-45);ctx.lineWidth=1.8;
      ctx.beginPath();
      if(atk){ctx.arc(0,hY+8,4,0.2,Math.PI-0.2);}
      else if(hurt){ctx.arc(0,hY+10,3,-Math.PI+0.4,-0.4);}
      else{ctx.moveTo(-4,hY+9);ctx.quadraticCurveTo(0,hY+11,4,hY+9);}
      ctx.stroke();
    }

    // ── HAIR ──────────────────────────────────────────────────────────────
    const hairC = this.isAI ? '#1a0800' : '#0a0a0a';
    ctx.fillStyle=flash?'#fff':hairC;
    ctx.beginPath();ctx.ellipse(0,hY-11,13,9,0,Math.PI,Math.PI*2);ctx.fill();
    // Hair detail
    if(!flash){
      ctx.fillStyle=this.isAI?'#3a1000':'#2a2a2a';
      ctx.beginPath();ctx.ellipse(0,hY-18,8,5,0,Math.PI,Math.PI*2);ctx.fill();
    }
    // Headband
    ctx.fillStyle=flash?'#fff':(this.isAI?'#cc2200':'#cc7700');
    ctx.beginPath();ctx.roundRect(-14,hY-8,28,5,2);ctx.fill();
    // headband pattern
    ctx.fillStyle='rgba(255,255,255,0.4)';
    for(let hbi=-3;hbi<=3;hbi++){ctx.beginPath();ctx.arc(hbi*4,hY-5,1.2,0,Math.PI*2);ctx.fill();}

    // HP bar
    const bw=52,bh=5;
    ctx.save();ctx.scale(1/this.facing,1);
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(-bw/2,hY-38,bw,bh+2);
    const hp=this.hp/MAX_HP;
    ctx.fillStyle=hp>0.5?'#44ff88':hp>0.25?'#ffdd00':'#ff2244';
    ctx.fillRect(-bw/2,hY-37,bw*hp,bh);
    ctx.restore();

    ctx.restore();
  }
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function shadeColor(hex, amt) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amt));
  g=Math.max(0,Math.min(255,g+amt));
  b=Math.max(0,Math.min(255,b+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function fRect(f){return{x:f.x-22,y:f.y-96,w:44,h:96};}
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ── GAME STATE ────────────────────────────────────────────────────────────────
const keys={};
let p1,ai,projs,gs='start',roundTime=ROUND_TIME,roundTimer=60,roundMsgTimer=0,p1W=0,aiW=0;
let camX=0;

function initRound(){
  // P1: fair skin, white gi, green belt
  p1=new Fighter(190,'#e8c49a','#f0f0e8','#228844',1,false);
  // AI: slightly darker skin, red gi, black belt
  ai=new Fighter(630,'#d4a870','#cc2200','#111111',-1,true);
  projs=[];roundTime=ROUND_TIME;roundTimer=60;
  gs='roundStart';showMsg('ROUND '+(p1W+aiW+1),85);
}

function showMsg(m,d=90){roundMsgTimer=d;const e=document.getElementById('round-msg');e.textContent=m;e.style.opacity='1';}
function hideMsg(){document.getElementById('round-msg').style.opacity='0';}

function checkHits(){
  if(p1.attackBox&&overlap(p1.attackBox,fRect(ai))){ai.takeDamage(p1.attackDmg,p1.facing*2.5);p1.attackBox=null;}
  if(ai.attackBox&&overlap(ai.attackBox,fRect(p1))){p1.takeDamage(ai.attackDmg,ai.facing*2.5);ai.attackBox=null;}
  for(const pr of projs){
    if(!pr.alive)continue;
    const tgt=pr.owner===0?ai:p1;
    if(Math.abs(pr.x-tgt.x)<30&&Math.abs(pr.y-(tgt.y-65))<32){tgt.takeDamage(16,pr.vx*0.4);pr.alive=false;}
  }
}

function updateHUD(){
  document.getElementById('p1-bar').style.width=(p1.hp/MAX_HP*100)+'%';
  document.getElementById('p2-bar').style.width=(ai.hp/MAX_HP*100)+'%';
  document.getElementById('timer').textContent=Math.ceil(roundTime);
}

function zscale(f){const d=Math.abs(f.x-W/2)/(W/2);return 0.97-d*0.05;}
function zoff(f){const d=Math.abs(f.x-W/2)/(W/2);return d*5;}

function drawStart(){
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ffd700';ctx.font='bold 50px serif';
  ctx.shadowColor='#ffd700';ctx.shadowBlur=28;
  ctx.fillText('KUNG FU ARENA',W/2,125);ctx.shadowBlur=0;
  ctx.fillStyle='#cc4400';ctx.font='bold 18px Courier New';
  ctx.fillText('☯  CHEN  vs  HONG  ☯',W/2,165);
  ctx.fillStyle='#ddd';ctx.font='14px Courier New';
  ctx.fillText('A/D bouger   W sauter   S garde',W/2,220);
  ctx.fillText('U poing   I pied   O uppercut   J ki blast',W/2,244);
  ctx.fillStyle='#ffd700';ctx.globalAlpha=0.6+Math.sin(Date.now()*0.004)*0.4;
  ctx.font='bold 20px Courier New';
  ctx.fillText('[ ENTRÉE POUR COMMENCER ]',W/2,305);
  ctx.globalAlpha=1;ctx.textAlign='left';
}

function drawOver(){
  ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const wn=p1W>aiW?'CHEN':'HONG';
  ctx.fillStyle=p1W>aiW?'#44ff88':'#ff5500';
  ctx.font='bold 52px serif';
  ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=30;
  ctx.fillText(wn+' GAGNE !',W/2,160);ctx.shadowBlur=0;
  ctx.fillStyle='#ccc';ctx.font='16px Courier New';
  ctx.fillText('Score  Chen '+p1W+'  —  Hong '+aiW,W/2,208);
  ctx.fillStyle='#ffd700';ctx.globalAlpha=0.6+Math.sin(Date.now()*0.004)*0.4;
  ctx.font='bold 18px Courier New';
  ctx.fillText('[ ENTRÉE pour rejouer ]',W/2,275);
  ctx.globalAlpha=1;ctx.textAlign='left';
}

let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;
  if(p1&&ai){const mid=(p1.x+ai.x)/2;camX+=(mid-W/2-camX)*0.04;}
  drawBG();
  if(gs==='start'){drawStart();requestAnimationFrame(loop);return;}
  if(gs==='roundStart'){
    p1.draw(zscale(p1),zoff(p1));ai.draw(zscale(ai),zoff(ai));
    roundMsgTimer--;if(roundMsgTimer<=0){hideMsg();showMsg('FIGHT!',48);gs='fight';}
    updateHUD();requestAnimationFrame(loop);return;
  }
  if(gs==='fight'){
    roundTimer--;if(roundTimer<=0){roundTime-=1/60;roundTimer=60;}
    p1.update(keys,ai,projs);ai.update(keys,p1,projs);
    for(const pr of projs)pr.update();
    projs=projs.filter(p=>p.alive);
    checkHits();updateHUD();
    const[front,back]=p1.x<ai.x?[ai,p1]:[p1,ai];
    back.draw(zscale(back),zoff(back));
    for(const pr of projs)pr.draw();
    front.draw(zscale(front),zoff(front));
    const cd=document.getElementById('combo-display');
    if(p1.comboCount>=2&&p1.comboTimer>0){cd.textContent=p1.comboCount+' HIT COMBO!';cd.style.opacity='1';}
    else cd.style.opacity='0';
    if(p1.hp<=0||ai.hp<=0||roundTime<=0){
      let msg;
      if(roundTime<=0){if(p1.hp>ai.hp){p1W++;msg='CHEN WINS!';}else if(ai.hp>p1.hp){aiW++;msg='HONG WINS!';}else{msg='DRAW!';}}
      else if(p1.hp<=0){aiW++;msg='HONG WINS!';}
      else{p1W++;msg='CHEN WINS!';}
      showMsg(msg,130);gs='roundEnd';
    }
    roundMsgTimer--;if(roundMsgTimer<=0)hideMsg();
  }
  if(gs==='roundEnd'){
    p1.update(keys,ai,projs);ai.update(keys,p1,projs);
    const[front,back]=p1.x<ai.x?[ai,p1]:[p1,ai];
    back.draw(zscale(back),zoff(back));
    for(const pr of projs)pr.draw();
    front.draw(zscale(front),zoff(front));
    updateHUD();roundMsgTimer--;
    if(roundMsgTimer<=0){hideMsg();if(p1W>=2||aiW>=2)gs='gameover';else initRound();}
  }
  if(gs==='gameover'){
    const[front,back]=p1.x<ai.x?[ai,p1]:[p1,ai];
    back.draw(zscale(back),zoff(back));front.draw(zscale(front),zoff(front));
    drawOver();
  }
  requestAnimationFrame(loop);
}

window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Enter'){if(gs==='start'||gs==='gameover'){p1W=0;aiW=0;initRound();}}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

initRound();gs='start';requestAnimationFrame(loop);
</script>
